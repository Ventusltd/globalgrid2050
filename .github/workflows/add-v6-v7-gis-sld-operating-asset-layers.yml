name: Add V6 V7 GIS SLD Operating Asset Layers

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-operating-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GRIDBOT_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Add GIS SLD operating asset layers
        run: python scripts/add_v6_v7_gis_sld_operating_asset_layers.py

      - name: Commit and push operating asset layer update
        env:
          PAT: ${{ secrets.GRIDBOT_PAT }}
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"

          git pull --rebase --autostash origin main
          git add \
            solar-bess-topology-v6/gis-sld-financial-sandbox/index.html \
            solar-bess-topology-v6/gis-sld-financial-sandbox/gis-sld-v5-map.js \
            solar-bess-topology-v6/gis-sld-financial-sandbox/gis-sld-v5-ui.js \
            solar-bess-topology-v6/gis-sld-financial-sandbox/gis-sld-v5-ui-core.js \
            solar-bess-topology-v6/gis-sld-financial-sandbox/gis-sld-v5.css \
            solar-bess-topology-v7/gis-sld-financial-sandbox/index.html \
            solar-bess-topology-v7/gis-sld-financial-sandbox/gis-sld-v5-map.js \
            solar-bess-topology-v7/gis-sld-financial-sandbox/gis-sld-v5-ui.js \
            solar-bess-topology-v7/gis-sld-financial-sandbox/gis-sld-v5-ui-core.js \
            solar-bess-topology-v7/gis-sld-financial-sandbox/gis-sld-v5.css \
            scripts/add_v6_v7_gis_sld_operating_asset_layers.py \
            gridbot_reports/add_v6_v7_gis_sld_operating_asset_layers.md

          if git diff --cached --quiet; then
            echo "No operating asset layer changes to commit."
            exit 0
          fi

          git commit -m "Add operating asset layers to GIS SLD"
          git pull --rebase --autostash origin main
          git push https://${PAT}@github.com/${{ github.repository }}.git HEAD:main
