name: Add V6 V7 Print V3 Financials Patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-print-v3-financials:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GRIDBOT_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Add print V3 financials formatting patch
        run: python scripts/add_v6_v7_print_v3_financials_patch.py

      - name: Commit and push print V3 financials update
        env:
          PAT: ${{ secrets.GRIDBOT_PAT }}
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"

          git pull --rebase --autostash origin main
          git add \
            solar-bess-topology-v6/gis-sld-financial-sandbox/gis-sld-v5.css \
            solar-bess-topology-v7/gis-sld-financial-sandbox/gis-sld-v5.css \
            scripts/add_v6_v7_print_v3_financials_patch.py \
            gridbot_reports/add_v6_v7_print_v3_financials_patch.md

          if git diff --cached --quiet; then
            echo "No print V3 financials changes to commit."
            exit 0
          fi

          git commit -m "Add print V3 financials formatting patch"
          git pull --rebase --autostash origin main
          git push https://${PAT}@github.com/${{ github.repository }}.git HEAD:main
