<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>EARTH | VENTUS Planetary Intelligence</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #container { width: 100vw; height: 100vh; }
        .hud {
            position: absolute; top: 30px; left: 30px; color: #00ffff; pointer-events: none;
            text-shadow: 0 0 10px #00ffff; border-left: 2px solid #00ffff; padding-left: 15px;
        }
        .label { font-size: 28px; font-weight: bold; letter-spacing: 5px; text-transform: uppercase; }
        .status { font-size: 12px; margin-top: 10px; opacity: 0.8; }
        #loading {
            position: absolute; width: 100%; height: 100%; background: #000;
            display: flex; justify-content: center; align-items: center; color: #00ffff; z-index: 100;
        }
    </style>
</head>
<body>

<div id="loading">INITIALIZING PLANETARY MESH...</div>

<div class="hud">
    <div class="label">Earth</div>
    <div class="status">SYSTEM: VENTUS CORE v1.0<br>DATA: GLOBAL UNIFICATION ESTIMATES<br>STATUS: ACTIVE MESH SCAN</div>
</div>

<div id="container"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const container = document.getElementById('container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    // Earth Group
    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    // 1. EARTH TEXTURE (Night Lights)
    const loader = new THREE.TextureLoader();
    const earthGeometry = new THREE.SphereGeometry(5, 64, 64);
    const earthMaterial = new THREE.MeshPhongMaterial({
        map: loader.load('https://unpkg.com/three-globe/example/img/earth-night.jpg'),
        bumpMap: loader.load('https://unpkg.com/three-globe/example/img/earth-topology.png'),
        bumpScale: 0.05,
        specular: new THREE.Color('#111'),
        shininess: 5
    });
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    earthGroup.add(earth);

    // 2. ATMOSPHERE GLOW
    const atmoGeom = new THREE.SphereGeometry(5.2, 64, 64);
    const atmoMat = new THREE.ShaderMaterial({
        vertexShader: `
            varying vec3 vNormal;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            varying vec3 vNormal;
            void main() {
                float intensity = pow(0.7 - dot(vNormal, vec3(0, 0, 1.0)), 2.0);
                gl_FragColor = vec4(0.0, 0.5, 1.0, 1.0) * intensity;
            }
        `,
        side: THREE.BackSide,
        blending: THREE.AdditiveBlending,
        transparent: true
    });
    const atmosphere = new THREE.Mesh(atmoGeom, atmoMat);
    earthGroup.add(atmosphere);

    // 3. STARFIELD
    const starGeom = new THREE.BufferGeometry();
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
    const starVertices = [];
    for (let i = 0; i < 10000; i++) {
        const x = (Math.random() - 0.5) * 1000;
        const y = (Math.random() - 0.5) * 1000;
        const z = (Math.random() - 0.5) * 1000;
        starVertices.push(x, y, z);
    }
    starGeom.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
    const stars = new THREE.Points(starGeom, starMat);
    scene.add(stars);

    // 4. LIGHTING
    const ambientLight = new THREE.AmbientLight(0x404040, 2);
    scene.add(ambientLight);
    const dLight = new THREE.DirectionalLight(0xffffff, 1);
    dLight.position.set(5, 3, 5);
    scene.add(dLight);

    camera.position.z = 15;

    // DATA LOADING LOGIC (Using your GeoJSON files)
    async function loadDataLayer(url, color) {
        try {
            const res = await fetch(url);
            const data = await res.json();
            data.features.forEach(feat => {
                if (feat.geometry.type === 'LineString') {
                    createArc(feat.geometry.coordinates, color);
                }
            });
        } catch(e) { console.log("Layer missing: ", url); }
    }

    function latLngToVector3(lat, lng, radius) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        const x = -(radius * Math.sin(phi) * Math.cos(theta));
        const z = (radius * Math.sin(phi) * Math.sin(theta));
        const y = (radius * Math.cos(phi));
        return new THREE.Vector3(x, y, z);
    }

    function createArc(coords, color) {
        const points = coords.map(c => latLngToVector3(c[1], c[0], 5.05));
        const curve = new THREE.CatmullRomCurve3(points);
        const geometry = new THREE.TubeGeometry(curve, 64, 0.015, 8, false);
        const material = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.8 });
        const mesh = new THREE.Mesh(geometry, material);
        earthGroup.add(mesh);
    }

    // Initialize Layers
    loadDataLayer('../subsea_data_cables.geojson', 0x00ffff);
    loadDataLayer('../unification_deep_subsea_estimates.geojson', 0xff00ff);

    document.getElementById('loading').style.display = 'none';

    function animate() {
        requestAnimationFrame(animate);
        earthGroup.rotation.y += 0.001;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
