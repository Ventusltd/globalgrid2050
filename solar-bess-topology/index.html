<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ventus 3D Trench Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        #map { width: 100%; height: 100vh; }
        
        .ui-panel { 
            position: absolute; top: 20px; left: 20px; background: rgba(10,10,10,0.95); 
            border: 1px solid #444; padding: 15px; width: 250px; border-radius: 4px; z-index: 10;
        }
        
        h2 { margin: 0 0 15px 0; color: #ff00ff; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px;}
        
        .input-group { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; color: #888; align-items: center;}
        input { width: 60px; background: #111; color: #00ffff; border: 1px solid #555; padding: 4px; font-family: monospace; text-align: center; }
        input:focus { border-color: #00ffff; outline: none; }
        
        button { 
            width: 100%; padding: 10px; margin-top: 15px; background: #000; color: #ff00ff; 
            border: 1px solid #ff00ff; cursor: pointer; font-family: monospace; font-weight: bold; text-transform: uppercase;
        }
        button:hover { background: #ff00ff; color: #000; }
        
        .instructions { font-size: 10px; color: #555; margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-panel">
        <h2>3D Trench Builder</h2>
        
        <div class="input-group">Length (m): <input type="number" id="t-len" value="10.0" step="1"></div>
        <div class="input-group">Width (m): <input type="number" id="t-wid" value="1.2" step="0.1"></div>
        <div class="input-group">Depth (m): <input type="number" id="t-dep" value="0.8" step="0.1"></div>
        <div class="input-group">No. of Pipes: <input type="number" id="t-pipes" value="4" step="1"></div>
        
        <button onclick="drawTrench()">Render 3D</button>
        
        <div class="instructions">
            <b>CONTROLS:</b><br>
            • Right-Click & Drag to rotate and tilt the 3D camera.<br>
            • Scroll to zoom in/out.
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        center: [-0.979, 52.882], 
        zoom: 20,
        pitch: 60,    // Tilt the camera 60 degrees to show 3D
        bearing: 45,  // Rotate slightly
        attributionControl: false
    });

    map.on('load', () => {
        // Source and Layer for the Trench Dirt Walls
        map.addSource('src-walls', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
        map.addLayer({
            id: 'l-walls', type: 'fill-extrusion', source: 'src-walls',
            paint: { 
                'fill-extrusion-color': '#3e2723', // Dirt brown
                'fill-extrusion-height': ['get', 'height'], 
                'fill-extrusion-base': 0, 
                'fill-extrusion-opacity': 0.8 
            }
        });

        // Source and Layer for the Pipes
        map.addSource('src-pipes', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
        map.addLayer({
            id: 'l-pipes', type: 'fill-extrusion', source: 'src-pipes',
            paint: { 
                'fill-extrusion-color': '#111111', // Black pipes
                'fill-extrusion-height': 0.15,     // Pipe top height
                'fill-extrusion-base': 0.05,       // Pipe bottom height (floating slightly off trench floor)
                'fill-extrusion-opacity': 1.0 
            }
        });

        // Source and Layer for Red Warning Tape (Optional)
        map.addSource('src-tape', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
        map.addLayer({
            id: 'l-tape', type: 'fill-extrusion', source: 'src-tape',
            paint: { 
                'fill-extrusion-color': '#ff0000', 
                'fill-extrusion-height': 0.5, // 0.5m off the bottom
                'fill-extrusion-base': 0.49,  // Super thin tape
                'fill-extrusion-opacity': 0.9 
            }
        });

        // Draw the initial default trench
        drawTrench();
    });

    function drawTrench() {
        const L = parseFloat(document.getElementById('t-len').value);
        const W = parseFloat(document.getElementById('t-wid').value);
        const D = parseFloat(document.getElementById('t-dep').value);
        const P = parseInt(document.getElementById('t-pipes').value);

        const center = [-0.979, 52.882];
        
        // Math to convert meters to map degrees
        const latToM = 111320;
        const lonToM = 111320 * Math.cos(center[1] * Math.PI / 180);

        const dLonL = (L/2) / lonToM;
        const dLatW = (W/2) / latToM;
        const wallThickness = 0.15 / latToM; // 15cm dirt wall thickness for visual rendering

        // 1. CREATE THE HOLLOW TRENCH WALLS
        const walls = {
            type: 'Feature',
            properties: { height: D },
            geometry: {
                type: 'Polygon',
                coordinates: [
                    [ // Outer Boundary
                        [center[0]-dLonL, center[1]-dLatW],
                        [center[0]+dLonL, center[1]-dLatW],
                        [center[0]+dLonL, center[1]+dLatW],
                        [center[0]-dLonL, center[1]+dLatW],
                        [center[0]-dLonL, center[1]-dLatW]
                    ],
                    [ // Inner Hole (The dug-out trench)
                        [center[0]-dLonL+wallThickness, center[1]-dLatW+wallThickness],
                        [center[0]-dLonL+wallThickness, center[1]+dLatW-wallThickness],
                        [center[0]+dLonL-wallThickness, center[1]+dLatW-wallThickness],
                        [center[0]+dLonL-wallThickness, center[1]-dLatW+wallThickness],
                        [center[0]-dLonL+wallThickness, center[1]-dLatW+wallThickness]
                    ]
                ]
            }
        };
        map.getSource('src-walls').setData(walls);

        // 2. CREATE THE PIPES
        const pipesData = { type: 'FeatureCollection', features: [] };
        // Calculate even spacing for the pipes across the width
        const spacing = W / (P + 1);

        for(let i=1; i<=P; i++) {
            // Offset from the center of the trench
            const offsetM = -(W/2) + (spacing * i);
            const offsetLat = offsetM / latToM;
            const pipeRadius = 0.06 / latToM; // 120mm diameter pipe

            pipesData.features.push({
                type: 'Feature',
                geometry: {
                    type: 'Polygon',
                    coordinates: [[
                        [center[0]-dLonL, center[1]+offsetLat-pipeRadius],
                        [center[0]+dLonL, center[1]+offsetLat-pipeRadius],
                        [center[0]+dLonL, center[1]+offsetLat+pipeRadius],
                        [center[0]-dLonL, center[1]+offsetLat+pipeRadius],
                        [center[0]-dLonL, center[1]+offsetLat-pipeRadius]
                    ]]
                }
            });
        }
        map.getSource('src-pipes').setData(pipesData);

        // 3. CREATE THE RED WARNING TAPE (Running down the middle)
        const tapeWidth = 0.15 / latToM;
        const tapeFeature = {
            type: 'Feature',
            geometry: {
                type: 'Polygon',
                coordinates: [[
                    [center[0]-dLonL, center[1]-tapeWidth],
                    [center[0]+dLonL, center[1]-tapeWidth],
                    [center[0]+dLonL, center[1]+tapeWidth],
                    [center[0]-dLonL, center[1]+tapeWidth],
                    [center[0]-dLonL, center[1]-tapeWidth]
                ]]
            }
        };
        map.getSource('src-tape').setData(tapeFeature);
    }
</script>
</body>
</html>
