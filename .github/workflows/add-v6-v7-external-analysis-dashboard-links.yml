name: Add V6 V7 External Analysis Dashboard Links

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-dashboard-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GRIDBOT_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Add external analysis links to V6 and V7 dashboards
        run: python scripts/add_v6_v7_external_analysis_dashboard_links.py

      - name: Commit and push dashboard updates
        env:
          PAT: ${{ secrets.GRIDBOT_PAT }}
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"

          git pull --rebase --autostash origin main
          git add solar-bess-topology-v6/index.html solar-bess-topology-v7/index.html scripts/add_v6_v7_external_analysis_dashboard_links.py gridbot_reports/add_v6_v7_external_analysis_dashboard_links.md

          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
            exit 0
          fi

          git commit -m "Add external analysis links to V6 and V7 dashboards"
          git pull --rebase --autostash origin main
          git push https://${PAT}@github.com/${{ github.repository }}.git HEAD:main
