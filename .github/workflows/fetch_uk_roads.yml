name: Fetch UK Roads Network

on:
  schedule:
    - cron: '0 6 1 * *'   # 1st of every month at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-roads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GRIDBOT_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run UK Roads Fetcher
        run: python repd_grid_atlasv8/scripts/fetch_uk_roads.py

      - name: Commit and push changes
        env:
          PAT: ${{ secrets.GRIDBOT_PAT }}
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"
          
          # Stage the new massive geojson files
          git add uk_motorways.geojson uk_trunk_roads.geojson uk_primary_roads.geojson || true
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Automated UK Roads update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push https://${PAT}@github.com/${{ github.repository }}.git HEAD:main
          else
            echo "No changes to commit"
          fi
