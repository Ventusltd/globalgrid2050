name: V5 DC AC LV Topology Trigger

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install DC AC LV HTML
        run: python solar-bess-topology-v5/install_dc_ac_lv_01_html.py

      - name: Install DC AC LV CSS
        run: python solar-bess-topology-v5/install_dc_ac_lv_02_css.py

      - name: Install DC AC LV JS
        run: python solar-bess-topology-v5/install_dc_ac_lv_03_js.py

      - name: Install DC AC LV link
        run: python solar-bess-topology-v5/install_dc_ac_lv_04_link.py

      - name: Commit DC AC LV topology app
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Install DC AC LV topology review app
          file_pattern: solar-bess-topology-v5/dc-ac-lv-topology-review-v5.html solar-bess-topology-v5/dc-ac-lv-topology-review-v5.css solar-bess-topology-v5/dc-ac-lv-topology-review-v5.js solar-bess-topology-v5/module-layout-v5.html
