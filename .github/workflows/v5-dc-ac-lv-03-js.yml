name: V5 DC AC LV 03 JS

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  install-js:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install DC AC LV topology JS
        run: python solar-bess-topology-v5/install_dc_ac_lv_03_js.py

      - name: Commit DC AC LV topology JS
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Install DC AC LV topology JS
          file_pattern: solar-bess-topology-v5/dc-ac-lv-topology-review-v5.js
