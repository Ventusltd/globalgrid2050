<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>EARTH DIGITAL TWIN | VENTUS</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #container { width: 100vw; height: 100vh; transition: opacity 1s ease-in; }
        .hud {
            position: absolute; bottom: 40px; left: 40px; color: #00ffff; pointer-events: none;
            text-shadow: 0 0 15px #00ffff; border-left: 3px solid #00ffff; padding-left: 20px; z-index: 10;
        }
        .label { font-size: 28px; font-weight: bold; letter-spacing: 5px; text-transform: uppercase; }
        .tagline { font-size: 10px; letter-spacing: 1px; margin-top: 5px; color: #fff; opacity: 0.8; }
        .meta { font-size: 9px; opacity: 0.5; margin-top: 10px; line-height: 1.4; }
        #loader { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffff; font-size: 12px; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="loader">SYNCHRONIZING DIGITAL TWIN...</div>

<div class="hud">
    <div class="label">Earth Digital Twin</div>
    <div class="tagline">VENTUS PLANETARY INFRASTRUCTURE ARCHITECTURE // 2050</div>
    <div class="meta">
        COORDINATE SYSTEM: WGS 84 / EPSG:4326<br>
        DATA SOURCE: OPEN INFRASTRUCTURE INTELLIGENCE<br>
        VISUALIZATION: GPU-ACCELERATED SPHERICAL MESH
    </div>
</div>

<div id="container" style="opacity: 0;"></div>

<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

<script type="module">
    import * as THREE from 'three';

    const container = document.getElementById('container');
    const loaderEl = document.getElementById('loader');
    
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for performance
    container.appendChild(renderer.domElement);

    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    // Texture Loading Manager
    const loadingManager = new THREE.LoadingManager(() => {
        loaderEl.style.display = 'none';
        container.style.opacity = '1';
    });

    const texLoader = new THREE.TextureLoader(loadingManager);
    
    const earthGeometry = new THREE.SphereGeometry(5, 64, 64);
    const earthMaterial = new THREE.MeshPhongMaterial({
        map: texLoader.load('https://unpkg.com/three-globe/example/img/earth-night.jpg'),
        bumpMap: texLoader.load('https://unpkg.com/three-globe/example/img/earth-topology.png'),
        bumpScale: 0.05, 
        shininess: 8
    });
    
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    earthGroup.add(earth);

    // Global Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(5, 3, 5);
    scene.add(sun);

    // Initial Camera Position for Portrait Mobile
    camera.position.z = window.innerHeight > window.innerWidth ? 20 : 15;

    // GPS to 3D Conversion
    function latLngToV3(lat, lng, r) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(-r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
    }

    // Geometry Optimization: Low radial segments (4) for mobile performance
    async function addLayer(url, color, size) {
        try {
            const res = await fetch(url);
            const data = await res.json();
            data.features.forEach(f => {
                if (f.geometry.type === 'LineString') {
                    const points = f.geometry.coordinates.map(c => latLngToV3(c[1], c[0], 5.03));
                    const curve = new THREE.CatmullRomCurve3(points);
                    const tubeGeom = new THREE.TubeGeometry(curve, 48, size, 4, false);
                    const tubeMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.7 });
                    earthGroup.add(new THREE.Mesh(tubeGeom, tubeMat));
                }
            });
        } catch (err) { console.warn("Layer data not found:", url); }
    }

    // Load Data
    addLayer('../subsea_data_cables.geojson', 0x00ffff, 0.012);
    addLayer('../unification_deep_subsea_estimates.geojson', 0xff00ff, 0.018);

    function animate() {
        requestAnimationFrame(animate);
        earthGroup.rotation.y += 0.0012; // Slow professional rotation
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.position.z = window.innerHeight > window.innerWidth ? 20 : 15;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
