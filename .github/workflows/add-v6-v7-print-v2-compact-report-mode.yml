name: Add V6 V7 Print V2 Compact Report Mode

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-print-v2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GRIDBOT_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Add compact A4 print report mode to V6 and V7 apps
        run: python scripts/add_v6_v7_print_v2_compact_report_mode.py

      - name: Commit and push compact print update
        env:
          PAT: ${{ secrets.GRIDBOT_PAT }}
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"

          git pull --rebase --autostash origin main
          git add \
            solar-bess-topology-v6/gis-sld-financial-sandbox/gis-sld-v5.css \
            solar-bess-topology-v7/gis-sld-financial-sandbox/gis-sld-v5.css \
            solar-bess-topology-v6/module-layout/module-layout-v5.css \
            solar-bess-topology-v7/module-layout/module-layout-v5.css \
            solar-bess-topology-v6/dc-ac-lv-topology-review/dc-ac-lv-topology-review-v5.css \
            solar-bess-topology-v7/dc-ac-lv-topology-review/dc-ac-lv-topology-review-v5.css \
            solar-bess-topology-v6/cable-geometry-visualiser/style.css \
            solar-bess-topology-v7/cable-geometry-visualiser/style.css \
            scripts/add_v6_v7_print_v2_compact_report_mode.py \
            gridbot_reports/add_v6_v7_print_v2_compact_report_mode.md

          if git diff --cached --quiet; then
            echo "No print v2 changes to commit."
            exit 0
          fi

          git commit -m "Add compact A4 print report mode to V6 and V7 apps"
          git pull --rebase --autostash origin main
          git push https://${PAT}@github.com/${{ github.repository }}.git HEAD:main
