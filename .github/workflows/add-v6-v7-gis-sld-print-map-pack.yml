name: Add V6 V7 GIS SLD Print Map Pack

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-print-map-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GRIDBOT_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Add GIS SLD print map pack
        run: python scripts/add_v6_v7_gis_sld_print_map_pack.py

      - name: Commit and push GIS SLD print map pack
        env:
          PAT: ${{ secrets.GRIDBOT_PAT }}
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"

          git pull --rebase --autostash origin main
          git add \
            solar-bess-topology-v6/gis-sld-financial-sandbox/gis-sld-v5-map.js \
            solar-bess-topology-v6/gis-sld-financial-sandbox/gis-sld-v5-ui.js \
            solar-bess-topology-v6/gis-sld-financial-sandbox/gis-sld-v5.css \
            solar-bess-topology-v7/gis-sld-financial-sandbox/gis-sld-v5-map.js \
            solar-bess-topology-v7/gis-sld-financial-sandbox/gis-sld-v5-ui.js \
            solar-bess-topology-v7/gis-sld-financial-sandbox/gis-sld-v5.css \
            scripts/add_v6_v7_gis_sld_print_map_pack.py \
            gridbot_reports/add_v6_v7_gis_sld_print_map_pack.md

          if git diff --cached --quiet; then
            echo "No GIS SLD print map pack changes to commit."
            exit 0
          fi

          git commit -m "Add GIS SLD print map pack"
          git pull --rebase --autostash origin main
          git push https://${PAT}@github.com/${{ github.repository }}.git HEAD:main
