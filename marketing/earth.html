<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>EARTH | VENTUS SURPRISE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #container { width: 100vw; height: 100vh; filter: blur(0.4px) contrast(1.1) brightness(1.2); }
        .hud {
            position: absolute; bottom: 40px; left: 40px; color: #00ffff; pointer-events: none;
            text-shadow: 0 0 15px #00ffff; border-left: 3px solid #00ffff; padding-left: 20px;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .label { font-size: 32px; font-weight: bold; letter-spacing: 8px; text-transform: uppercase; }
        .tagline { font-size: 10px; letter-spacing: 2px; margin-top: 5px; color: #fff; }
    </style>
</head>
<body>

<div class="hud">
    <div class="label">Earth</div>
    <div class="tagline">PLANETARY CONNECTIVITY MESH // 2050 PROJECTION</div>
</div>

<div id="container"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('container').appendChild(renderer.domElement);

    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    const loader = new THREE.TextureLoader();
    
    // THE PLANET
    const earthGeometry = new THREE.SphereGeometry(5, 64, 64);
    const earthMaterial = new THREE.MeshPhongMaterial({
        map: loader.load('https://unpkg.com/three-globe/example/img/earth-night.jpg'),
        bumpMap: loader.load('https://unpkg.com/three-globe/example/img/earth-topology.png'),
        bumpScale: 0.05,
        shininess: 10
    });
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    earthGroup.add(earth);

    // THE GLOW (Inner)
    const glowGeom = new THREE.SphereGeometry(5.01, 64, 64);
    const glowMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.05 });
    earthGroup.add(new THREE.Mesh(glowGeom, glowMat));

    // LIGHTING
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const sunlight = new THREE.DirectionalLight(0xffffff, 1.5);
    sunlight.position.set(5, 3, 5);
    scene.add(sunlight);

    camera.position.z = 15;

    // PROJECT DATA INTO 3D SPACE
    function latLngToV3(lat, lng, r) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(-r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
    }

    async function addDataLayer(url, color, thickness) {
        const res = await fetch(url);
        const data = await res.json();
        data.features.forEach(f => {
            if (f.geometry.type === 'LineString') {
                const points = f.geometry.coordinates.map(c => latLngToV3(c[1], c[0], 5.03));
                const curve = new THREE.CatmullRomCurve3(points);
                const tube = new THREE.TubeGeometry(curve, 64, thickness, 8, false);
                const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.7 });
                earthGroup.add(new THREE.Mesh(tube, mat));
            }
        });
    }

    addDataLayer('../subsea_data_cables.geojson', 0x00ffff, 0.015);
    addDataLayer('../unification_deep_subsea_estimates.geojson', 0xff00ff, 0.02);

    // INTERACTION ENGINE
    let targetRotation = 0.0015;
    window.addEventListener('mousemove', (e) => {
        targetRotation = (e.clientX / window.innerWidth - 0.5) * 0.01;
    });

    function animate() {
        requestAnimationFrame(animate);
        earthGroup.rotation.y += targetRotation;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
