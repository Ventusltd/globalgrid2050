<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS-SLD Topology | Neat Grid Packing</title>
    
    <script src="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    
    <style>
        :root {
            --bg: #050505; --panel: rgba(10, 10, 10, 0.96); --line: #2f343d;
            --text: #ffffff; --muted: #a6adbb; --accent: #00ffff; --accent-alt: #ff9900;
            --ok: #00ff88; --substation: #ff3333; --inverter: #ffff00; 
            --array-blue: #0066ff;
            --warn: #ff4444;
        }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 20px; background: var(--bg); color: var(--text); font-family: "Courier New", monospace; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .dashboard { display: flex; gap: 20px; width: 100%; max-width: 1600px; height: 100%; }
        .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 4px; display: flex; flex-direction: column; }
        .panel-left { width: 420px; padding: 20px; flex-shrink: 0; overflow-y: auto; }
        .panel-right { flex: 1 1 auto; position: relative; border-radius: 4px; overflow: hidden; border: 1px solid var(--line); }
        
        h2 { margin: 0 0 10px 0; color: var(--text); font-size: 18px; text-transform: uppercase; border-bottom: 1px solid var(--line); padding-bottom: 10px; }
        h3 { margin: 15px 0 5px 0; color: var(--muted); font-size: 11px; text-transform: uppercase; border-bottom: 1px dashed #333; padding-bottom: 3px; }
        
        .tab-container { display: flex; border-bottom: 1px solid var(--line); margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px 5px; background: transparent; color: var(--muted); border: none; cursor: pointer; font-family: monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: bold; background: rgba(0, 255, 255, 0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .input-group { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
        .input-group input, .input-group select { width: 100px; background: #111; color: var(--accent); border: 1px solid #444; padding: 5px; text-align: right; border-radius: 3px; font-family: monospace; font-size: 11px; }
        .tab-content#central_tab .input-group input, .tab-content#central_tab .input-group select { color: var(--accent-alt); }
        .input-group select { text-align: left; }
        .input-group input:focus, .input-group select:focus { border-color: var(--text); outline: none; }
        .input-group input[type="checkbox"] { width: auto; accent-color: var(--accent-alt); transform: scale(1.2); }
        
        .search-box { display: flex; gap: 5px; margin-bottom: 15px; }
        .search-box input { flex: 1; background: #111; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 3px; font-family: monospace; font-size: 12px; }
        .search-box button { background: #222; color: var(--text); border: 1px solid #555; padding: 8px 12px; border-radius: 3px; cursor: pointer; font-family: monospace; font-weight: bold; }
        .search-box button:hover { background: #444; color: #fff; }
        
        .stat-box { background: rgba(0, 255, 255, 0.05); border: 1px solid var(--accent); padding: 12px; border-radius: 3px; margin-top: 15px; }
        .stat-box.central { background: rgba(255, 153, 0, 0.05); border-color: var(--accent-alt); }
        .stat-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; color: var(--muted); }
        .stat-val { color: var(--text); font-weight: bold; }
        .stat-val.cyan { color: var(--accent); font-size: 13px; }
        .stat-val.orange { color: var(--accent-alt); font-size: 13px; }
        .stat-val.alert { color: #ffcc00; }

        .engineering-note { background: rgba(255, 68, 68, 0.1); border: 1px solid var(--warn); padding: 10px; border-radius: 3px; margin-top: 15px; font-size: 10px; color: #ff9999; line-height: 1.4; }
        
        .btn { padding: 10px; background: #000; color: var(--text); border: 1px solid #555; cursor: pointer; font-family: monospace; font-weight: bold; text-transform: uppercase; border-radius: 3px; margin-top: 10px; width: 100%; transition: 0.2s; }
        .btn:hover { background: #222; color: #fff; }
        .btn.draw-btn { color: var(--bg); background: var(--accent); border-color: var(--accent); }
        .btn.draw-btn.central { background: var(--accent-alt); border-color: var(--accent-alt); }
        
        #map { width: 100%; height: 100%; }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 24px; pointer-events: none; z-index: 10; text-shadow: 0 0 5px #000; }
        
        .legend { position: absolute; bottom: 20px; left: 20px; background: var(--panel); border: 1px solid var(--line); padding: 10px; font-size: 10px; z-index: 1; border-radius: 4px; pointer-events: none; }
        .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .swatch { width: 12px; height: 12px; border: 1px solid #666; }

        .maplibregl-popup-content { background: #111; color: #fff; border: 1px solid #444; border-radius: 4px; font-family: "Courier New", monospace; padding: 12px; font-size: 11px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .maplibregl-popup-close-button { color: #888; padding: 4px; }
        .maplibregl-popup-close-button:hover { color: #fff; }
        .popup-row { display: flex; justify-content: space-between; margin-bottom: 4px; border-bottom: 1px solid #222; padding-bottom: 2px; gap: 15px; }
        .popup-val { font-weight: bold; color: var(--accent-alt); }

        @media (max-width: 800px) {
            body { height: auto; overflow: auto; padding: 10px; }
            .dashboard { flex-direction: column; height: auto; }
            .panel-left { width: 100%; max-height: none; flex-shrink: 0; }
            .panel-right { min-height: 80vh; flex-shrink: 0; } 
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="panel panel-left">
        <h2>GIS-SLD Engine</h2>

        <div class="search-box">
            <input type="text" id="loc_search" placeholder="Enter location (e.g. London)..." onkeydown="if(event.key === 'Enter') searchLocation()">
            <button onclick="searchLocation()">FLY</button>
        </div>

        <div class="tab-container">
            <button class="tab-btn active" id="tabbtn_string" onclick="switchTab('string')">String</button>
            <button class="tab-btn" id="tabbtn_central" onclick="switchTab('central')">Central</button>
        </div>

        <div id="string_tab" class="tab-content active">
            <h3>Dimensions & Physics</h3>
            <div class="input-group">
                <label>Module Rating (Wp)</label>
                <input type="number" id="mod_wp" value="660" />
            </div>
            <div class="input-group">
                <label>Mod L x W (m)</label>
                <div style="display: flex; gap: 4px;">
                    <input type="number" id="mod_l" value="2.38" step="0.01" style="width: 45px;" />
                    <input type="number" id="mod_w" value="1.30" step="0.01" style="width: 45px;" />
                </div>
            </div>
            <div class="input-group">
                <label>Mounting & GCR</label>
                <select id="mounting_type">
                    <option value="0.75">East-West Dome (~75%)</option>
                    <option value="0.45">Fixed Tilt South (~45%)</option>
                    <option value="0.35">Tracker (~35%)</option>
                </select>
            </div>

            <h3>Array Hierarchy (String)</h3>
            <div class="input-group">
                <label>Mods / String</label>
                <input type="number" id="x_mods" value="28" />
            </div>
            <div class="input-group">
                <label>Strings / Inverter</label>
                <input type="number" id="z_strings" value="18" />
            </div>
            <div class="input-group">
                <label>Inverters / Sub</label>
                <input type="number" id="y_invs" value="28" />
            </div>
            <div class="input-group">
                <label>Subs / Ring</label>
                <input type="number" id="s_subs" value="5" />
            </div>
            <div class="input-group">
                <label>33kV Rings</label>
                <input type="number" id="b_cols" value="6" />
            </div>

            <div class="stat-box">
                <div class="stat-row"><span>Active Power (P):</span><span class="stat-val cyan" id="out_p_mw">0.00 MW</span></div>
                <div class="stat-row"><span>Total Array Area:</span><span class="stat-val" id="out_total_acre">0 Acres</span></div>
            </div>
        </div>

        <div id="central_tab" class="tab-content">
            <h3>Dimensions & Physics</h3>
            <div class="input-group">
                <label>Module Rating (Wp)</label>
                <input type="number" id="mod_wp_c" value="660" />
            </div>
            <div class="input-group">
                <label>Mod L x W (m)</label>
                <div style="display: flex; gap: 4px;">
                    <input type="number" id="mod_l_c" value="2.38" step="0.01" style="width: 45px;" />
                    <input type="number" id="mod_w_c" value="1.30" step="0.01" style="width: 45px;" />
                </div>
            </div>
            <div class="input-group">
                <label>Mounting & GCR</label>
                <select id="mounting_type_c">
                    <option value="0.75">East-West Dome (~75%)</option>
                    <option value="0.45" selected>Fixed Tilt South (~45%)</option>
                    <option value="0.35">Tracker (~35%)</option>
                </select>
            </div>

            <h3>Array Hierarchy (Central)</h3>
            <div class="input-group">
                <label>Central AC Rating MWac</label>
                <select id="inv_ac_mw_c">
                    <option value="3.15">3.15 MWac</option>
                    <option value="4.4" selected>4.40 MWac</option>
                    <option value="4.6">4.60 MVA</option>
                    <option value="5.0">5.00 MWac</option>
                    <option value="6.25">6.25 MWac</option>
                    <option value="6.8">6.80 MWac</option>
                </select>
            </div>
            <div class="input-group">
                <label>DC/AC Ratio</label>
                <input type="number" id="dc_ac_ratio_c" value="1.20" step="0.05" />
            </div>
            <div class="input-group">
                <label>Modules / String</label>
                <input type="number" id="x_mods_c" value="28" />
            </div>
            <div class="input-group">
                <label>Strings / Combiner Box</label>
                <input type="number" id="str_per_cb_c" value="24" />
            </div>
            <div class="input-group">
                <label>Central Invs / MV Station</label>
                <input type="number" id="inv_per_mv_c" value="1" />
            </div>
            <div class="input-group">
                <label>MV Stations / 33kV Ring</label>
                <input type="number" id="mv_per_ring_c" value="4" />
            </div>
            <div class="input-group">
                <label>33kV Rings</label>
                <input type="number" id="rings_c" value="4" />
            </div>

            <div class="stat-box central">
                <div class="stat-row"><span>Total DC Capacity:</span><span class="stat-val orange" id="out_c_mwp">0.00 MWp</span></div>
                <div class="stat-row"><span>Total Array Area:</span><span class="stat-val orange" id="out_c_tot_acre">0 Ac</span></div>
            </div>
        </div>

        <button class="btn draw-btn" id="btn_draw" onclick="triggerDrawAtCenter()">⌖ DRAW NEAT GRID</button>
        <button class="btn" onclick="exportGeoJSON()">⬇ Export GeoJSON</button>
    </div>

    <div class="panel panel-right">
        <div class="crosshair">⌖</div>
        <div id="map"></div>
        
        <div class="legend" id="map_legend"></div>
    </div>
</div>

<script>
    let activeTab = 'string';
    let currentGeoJSON = { type: "FeatureCollection", features: [] };
    let activeDrawCenter = null; 

    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        center: [-0.1276, 51.5072], 
        zoom: 13
    });

    map.on('load', () => {
        map.addSource('topology', { type: 'geojson', data: currentGeoJSON });

        // Total Array Boundary (The Blue Shade)
        map.addLayer({
            id: 'overall_boundary_fill', type: 'fill', source: 'topology',
            filter: ['==', 'type', 'array_boundary'],
            paint: { 'fill-color': 'var(--array-blue)', 'fill-opacity': 0.25 }
        });
        map.addLayer({
            id: 'overall_boundary_line', type: 'line', source: 'topology',
            filter: ['==', 'type', 'array_boundary'],
            paint: { 'line-color': 'var(--array-blue)', 'line-width': 2, 'line-dasharray': [4, 4] }
        });

        // Polygons (Individual Rectangular Footprints)
        map.addLayer({
            id: 'footprints', type: 'fill', source: 'topology',
            filter: ['in', 'type', 'skid_footprint', 'central_footprint'],
            paint: { 
                'fill-color': ['match', ['get', 'type'], 'skid_footprint', '#00ffff', 'central_footprint', '#ff9900', '#000'], 
                'fill-opacity': 0.15 
            }
        });
        map.addLayer({
            id: 'footprints_outline', type: 'line', source: 'topology',
            filter: ['in', 'type', 'skid_footprint', 'central_footprint'],
            paint: { 
                'line-color': ['match', ['get', 'type'], 'skid_footprint', '#00ffff', 'central_footprint', '#ff9900', '#000'], 
                'line-width': 1 
            }
        });

        // Lines (Orthogonal Fishbone)
        map.addLayer({
            id: 'rings', type: 'line', source: 'topology',
            filter: ['==', 'type', '33kv_ring'],
            paint: { 'line-color': '#00ffff', 'line-width': 2 }
        });

        // Nodes (Inverters & MV Stations)
        map.addLayer({
            id: 'inverters', type: 'circle', source: 'topology',
            filter: ['in', 'type', 'inverter', 'central_inverter', 'mv_station'],
            paint: { 
                'circle-color': ['match', ['get', 'type'], 'inverter', '#ffff00', 'central_inverter', '#ff9900', 'mv_station', '#aa00ff', '#fff'], 
                'circle-radius': ['match', ['get', 'type'], 'inverter', 4, 'central_inverter', 6, 'mv_station', 4, 3], 
                'circle-stroke-color': '#000', 'circle-stroke-width': 1 
            }
        });

        // Primary Substation
        map.addLayer({
            id: 'substation', type: 'circle', source: 'topology',
            filter: ['==', 'type', 'primary_sub'],
            paint: { 'circle-color': '#ff3333', 'circle-radius': 8, 'circle-stroke-color': '#fff', 'circle-stroke-width': 2 }
        });

        updateLegend();
        updateAggregatesOnly();
    });

    function switchTab(tab) {
        activeTab = tab;
        document.getElementById('tabbtn_string').classList.toggle('active', tab === 'string');
        document.getElementById('tabbtn_central').classList.toggle('active', tab === 'central');
        document.getElementById('string_tab').classList.toggle('active', tab === 'string');
        document.getElementById('central_tab').classList.toggle('active', tab === 'central');
        
        const btnDraw = document.getElementById('btn_draw');
        if (tab === 'central') { btnDraw.classList.add('central'); } 
        else { btnDraw.classList.remove('central'); }
        
        updateLegend();
        computeAndDraw();
    }

    function updateLegend() {
        const legend = document.getElementById('map_legend');
        let html = `
            <div class="legend-item"><div class="swatch" style="background:var(--substation);"></div> Primary Substation</div>
            <div class="legend-item"><div class="swatch" style="background:var(--array-blue); opacity: 0.3; border-style: dashed;"></div> Total Array Boundary</div>
        `;
        if (activeTab === 'string') {
            html += `
                <div class="legend-item"><div class="swatch" style="background:var(--inverter);"></div> String Transformer Block</div>
                <div class="legend-item"><div class="swatch" style="background:transparent; border-color:var(--accent); border-bottom: 2px solid var(--accent);"></div> Orthogonal 33kV Trench</div>
            `;
        } else {
            html += `
                <div class="legend-item"><div class="swatch" style="background:var(--accent-alt);"></div> Central Inverter Block</div>
                <div class="legend-item"><div class="swatch" style="background:transparent; border-color:var(--accent); border-bottom: 2px solid var(--accent);"></div> Orthogonal 33kV Trench</div>
            `;
        }
        legend.innerHTML = html;
    }

    async function searchLocation() {
        const query = document.getElementById('loc_search').value;
        if (!query) return;
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`);
            const data = await res.json();
            if (data && data.length > 0) {
                map.flyTo({ center: [parseFloat(data[0].lon), parseFloat(data[0].lat)], zoom: 14 });
            }
        } catch (e) { console.error(e); }
    }

    function triggerDrawAtCenter() {
        activeDrawCenter = [map.getCenter().lng, map.getCenter().lat];
        computeAndDraw();
    }

    function updateAggregatesOnly() {
        if (activeTab === 'string') return updateStringAggregates();
        return updateCentralAggregates();
    }

    function updateStringAggregates() {
        const mod_wp = parseFloat(document.getElementById('mod_wp').value) || 0;
        const x = parseInt(document.getElementById('x_mods').value) || 0;
        const z = parseInt(document.getElementById('z_strings').value) || 0;
        const y = parseInt(document.getElementById('y_invs').value) || 0;
        const s = parseInt(document.getElementById('s_subs').value) || 0;
        const rings = parseInt(document.getElementById('b_cols').value) || 0;

        const mod_l = parseFloat(document.getElementById('mod_l').value) || 0;
        const mod_w = parseFloat(document.getElementById('mod_w').value) || 0;
        const gcr = parseFloat(document.getElementById('mounting_type').value) || 0.75;
        
        const total_blocks = rings * s;
        const total_invs = total_blocks * y;
        const total_p_mw = (total_invs * z * x * mod_wp) / 1000000;
        
        const block_ground_area_m2 = (x * z * y * mod_l * mod_w) / gcr;
        const total_array_acres = (block_ground_area_m2 / 4046.86) * total_blocks;

        document.getElementById('out_p_mw').textContent = total_p_mw.toFixed(2) + " MW";
        document.getElementById('out_total_acre').textContent = total_array_acres.toFixed(0) + " Acres";

        return { total_blocks, block_ground_area_m2 };
    }

    function updateCentralAggregates() {
        const mod_wp = parseFloat(document.getElementById('mod_wp_c').value) || 0;
        const mod_l = parseFloat(document.getElementById('mod_l_c').value) || 0;
        const mod_w = parseFloat(document.getElementById('mod_w_c').value) || 0;
        const gcr = parseFloat(document.getElementById('mounting_type_c').value) || 0.45;
        
        const x_mods = parseInt(document.getElementById('x_mods_c').value) || 0;
        const inv_ac_mw = parseFloat(document.getElementById('inv_ac_mw_c').value) || 0;
        const dc_ac_ratio = parseFloat(document.getElementById('dc_ac_ratio_c').value) || 0;
        
        const inv_per_mv = parseInt(document.getElementById('inv_per_mv_c').value) || 0;
        const mv_per_ring = parseInt(document.getElementById('mv_per_ring_c').value) || 0;
        const rings = parseInt(document.getElementById('rings_c').value) || 0;

        const str_dc_kwp = (x_mods * mod_wp) / 1000;
        const inv_dc_mwp = inv_ac_mw * dc_ac_ratio;
        const req_strings = Math.round((inv_dc_mwp * 1000) / str_dc_kwp);

        const total_blocks = inv_per_mv * mv_per_ring * rings;
        const total_dc_mwp = total_blocks * inv_dc_mwp;

        const block_ground_area_m2 = (req_strings * x_mods * mod_l * mod_w) / gcr;
        const total_array_acres = (block_ground_area_m2 / 4046.86) * total_blocks;

        document.getElementById('out_c_mwp').textContent = total_dc_mwp.toFixed(2) + " MWp";
        document.getElementById('out_c_tot_acre').textContent = total_array_acres.toFixed(0) + " Ac";

        return { total_blocks, block_ground_area_m2 };
    }

    function getRectPolygon(centerCoord, width_km, length_km, propType) {
        const pt = turf.point(centerCoord);
        const n = turf.destination(pt, length_km/2, 0, {units: 'kilometers'}).geometry.coordinates;
        const s = turf.destination(pt, length_km/2, 180, {units: 'kilometers'}).geometry.coordinates;
        
        const nw = turf.destination(turf.point(n), width_km/2, -90, {units: 'kilometers'}).geometry.coordinates;
        const ne = turf.destination(turf.point(n), width_km/2, 90, {units: 'kilometers'}).geometry.coordinates;
        const se = turf.destination(turf.point(s), width_km/2, 90, {units: 'kilometers'}).geometry.coordinates;
        const sw = turf.destination(turf.point(s), width_km/2, -90, {units: 'kilometers'}).geometry.coordinates;
        
        return turf.polygon([[nw, ne, se, sw, nw]], { type: propType });
    }

    function computeAndDraw() {
        if (!activeDrawCenter) return;
        const stats = updateAggregatesOnly();
        
        const N = stats.total_blocks;
        if (N === 0) return;

        // Calculate neat Grid Rows and Columns
        const cols = Math.ceil(Math.sqrt(N));
        const rows = Math.ceil(N / cols);

        // Dimensions of a single block
        const block_area_km2 = stats.block_ground_area_m2 / 1000000;
        const aspect = 1.4; // Make blocks slightly rectangular
        const block_w = Math.sqrt(block_area_km2 / aspect);
        const block_l = block_w * aspect;
        
        const spacing = 0.01; // 10 meters between blocks for tracks

        // Total grid dimensions
        const grid_w = (cols * block_w) + ((cols - 1) * spacing);
        const grid_l = (rows * block_l) + ((rows - 1) * spacing);

        let features = [];
        const subPt = turf.point(activeDrawCenter);
        features.push(turf.point(activeDrawCenter, { type: 'primary_sub' }));

        // The center of the entire grid sits just North of the Substation
        const gridCenter = turf.destination(subPt, (grid_l/2) + 0.05, 0, {units: 'kilometers'}).geometry.coordinates;

        // 1. Draw the Blue Shade (Total Array Boundary)
        // Add a tiny buffer around the absolute grid size
        features.push(getRectPolygon(gridCenter, grid_w + 0.02, grid_l + 0.02, 'array_boundary'));

        // 2. Calculate Top-Left starting corner for blocks
        const ptN = turf.destination(turf.point(gridCenter), grid_l/2, 0, {units: 'kilometers'}).geometry.coordinates;
        const ptNW = turf.destination(turf.point(ptN), grid_w/2, -90, {units: 'kilometers'}).geometry.coordinates;

        let inverters = [];
        let count = 0;

        // 3. Loop through grid and drop perfectly aligned blocks
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                if (count >= N) break;

                // Move East then South from Top-Left
                let posE = turf.destination(turf.point(ptNW), (c * block_w) + (c * spacing) + (block_w/2), 90, {units: 'kilometers'}).geometry.coordinates;
                let finalPos = turf.destination(turf.point(posE), (r * block_l) + (r * spacing) + (block_l/2), 180, {units: 'kilometers'}).geometry.coordinates;

                const nodeType = activeTab === 'string' ? 'inverter' : 'central_inverter';
                const footType = activeTab === 'string' ? 'skid_footprint' : 'central_footprint';

                features.push(getRectFootprint(finalPos, stats.block_ground_area_m2, footType));
                
                let invNode = { coords: finalPos, type: nodeType };
                inverters.push(invNode);
                features.push(turf.point(finalPos, { type: nodeType }));

                count++;
            }
        }

        // 4. Fishbone Cable Routing (Straight up the middle, branching sideways)
        if (inverters.length > 0) {
            // Main spine goes North from substation
            let spineN = inverters[0].coords[1];
            inverters.forEach(inv => {
                if (inv.coords[1] > spineN) spineN = inv.coords[1];
            });

            // Draw Spine
            let spineCoords = [activeDrawCenter, [activeDrawCenter[0], spineN]];
            features.push(turf.lineString(spineCoords, { type: '33kv_ring' }));

            // Draw Branches connecting each block to the spine
            inverters.forEach(inv => {
                let branchCoords = [inv.coords, [activeDrawCenter[0], inv.coords[1]]];
                features.push(turf.lineString(branchCoords, { type: '33kv_ring' }));
            });
        }

        currentGeoJSON = turf.featureCollection(features);
        if (map.getSource('topology')) map.getSource('topology').setData(currentGeoJSON);
    }

    function exportGeoJSON() {
        if (currentGeoJSON.features.length === 0) return;
        const blob = new Blob([JSON.stringify(currentGeoJSON, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `gis_sld_${activeTab}_neat_grid.geojson`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    document.querySelectorAll('.input-group input, .input-group select').forEach(el => {
        el.addEventListener('input', computeAndDraw);
    });
</script>

</body>
</html>
