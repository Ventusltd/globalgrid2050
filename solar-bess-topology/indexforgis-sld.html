<script>
let activeTab = "string";
let currentGeoJSON = { type: "FeatureCollection", features: [] };
let activeDrawCenter = null;
let selectedSubstation = null;
let subsVisible = true;
let activePopup = null;
let satActive = false;

const map = new maplibregl.Map({
    container: "map",
    style: "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
    center: [-0.1276, 51.5072],
    zoom: 13
});

map.on("error", function(e) {
    console.error("MapLibre error:", e.error || e);
});

function showPopup(coords, html) {
    if (activePopup) activePopup.remove();

    activePopup = new maplibregl.Popup()
        .setLngLat(coords)
        .setHTML(html)
        .addTo(map);

    activePopup.on("close", () => {
        activePopup = null;
    });
}

function getProp(obj, keys, fallback = null) {
    for (const key of keys) {
        if (obj && obj[key] !== undefined && obj[key] !== null && obj[key] !== "") {
            return obj[key];
        }
    }
    return fallback;
}

function isValidLngLat(coords) {
    return Array.isArray(coords) &&
        coords.length >= 2 &&
        Number.isFinite(Number(coords[0])) &&
        Number.isFinite(Number(coords[1])) &&
        Number(coords[0]) >= -180 &&
        Number(coords[0]) <= 180 &&
        Number(coords[1]) >= -90 &&
        Number(coords[1]) <= 90;
}

function normaliseSubstationsGeoJSON(raw) {
    if (!raw) {
        throw new Error("Substation dataset is empty.");
    }

    let features = [];

    if (raw.type === "FeatureCollection" && Array.isArray(raw.features)) {
        features = raw.features;
    } else if (Array.isArray(raw)) {
        features = raw.map(item => ({
            type: "Feature",
            geometry: item.geometry || {
                type: "Point",
                coordinates: [
                    item.lon ?? item.lng ?? item.longitude ?? item.Longitude ?? item.X,
                    item.lat ?? item.latitude ?? item.Latitude ?? item.Y
                ]
            },
            properties: item.properties || item
        }));
    } else {
        throw new Error("Dataset is not a GeoJSON FeatureCollection or array.");
    }

    const cleaned = features
        .filter(f => f && f.geometry && f.geometry.type === "Point")
        .map(f => {
            const coords = f.geometry.coordinates.map(Number);
            if (!isValidLngLat(coords)) return null;

            const p = f.properties || {};

            return {
                type: "Feature",
                geometry: {
                    type: "Point",
                    coordinates: [coords[0], coords[1]]
                },
                properties: {
                    ...p,
                    name_clean: getProp(p, [
                        "name",
                        "Name",
                        "site_name",
                        "SiteName",
                        "Site Name",
                        "substation",
                        "Substation",
                        "substation_name",
                        "Substation Name"
                    ], "Substation"),
                    voltage_clean: getProp(p, [
                        "voltage",
                        "Voltage",
                        "kv",
                        "kV",
                        "KV",
                        "voltage_kv",
                        "Voltage kV"
                    ], "Unknown")
                }
            };
        })
        .filter(Boolean);

    if (cleaned.length === 0) {
        throw new Error("No valid point substations found after cleaning.");
    }

    return {
        type: "FeatureCollection",
        features: cleaned
    };
}

async function loadSubstationsIntoMap() {
    const candidatePaths = [
        "../grid_substations.geojson",
        "grid_substations.geojson",
        "./grid_substations.geojson",
        "../data/grid_substations.geojson",
        "data/grid_substations.geojson",
        "./data/grid_substations.geojson",
        "../data/atlas_v8/grid_substations.geojson",
        "data/atlas_v8/grid_substations.geojson",
        "./data/atlas_v8/grid_substations.geojson",
        "../data/grid_substations_v8.geojson",
        "data/grid_substations_v8.geojson",
        "./data/grid_substations_v8.geojson"
    ];

    const warnEl = document.getElementById("fetch_warning");
    const errors = [];

    for (const path of candidatePaths) {
        try {
            const res = await fetch(path, { cache: "no-store" });

            if (!res.ok) {
                errors.push(`${path}: HTTP ${res.status}`);
                continue;
            }

            const text = await res.text();

            if (!text.trim()) {
                errors.push(`${path}: empty file`);
                continue;
            }

            let raw;
            try {
                raw = JSON.parse(text);
            } catch (jsonErr) {
                errors.push(`${path}: invalid JSON`);
                continue;
            }

            const cleaned = normaliseSubstationsGeoJSON(raw);

            const src = map.getSource("src-subs");
            if (!src) {
                throw new Error("Map source src-subs does not exist.");
            }

            src.setData(cleaned);

            console.log("Substations loaded:", {
                path,
                count: cleaned.features.length,
                sample: cleaned.features[0]
            });

            if (warnEl) {
                warnEl.style.display = "none";
                warnEl.innerText = "";
            }

            return cleaned;
        } catch (err) {
            errors.push(`${path}: ${err.message}`);
        }
    }

    console.error("All substation load attempts failed:", errors);

    if (warnEl) {
        warnEl.style.display = "block";
        warnEl.innerText =
            "Substation Data Error: no valid dataset loaded. Check file name, folder path and whether the page is being served through HTTP.";
    }

    return null;
}

map.on("load", () => {
    map.addSource("sat-s", {
        type: "raster",
        tiles: [
            "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        ],
        tileSize: 256
    });

    map.addLayer({
        id: "l-sat",
        type: "raster",
        source: "sat-s",
        layout: { visibility: "none" }
    });

    map.addSource("src-subs", {
        type: "geojson",
        data: {
            type: "FeatureCollection",
            features: []
        }
    });

    map.addLayer({
        id: "l-subs",
        type: "circle",
        source: "src-subs",
        layout: { visibility: "visible" },
        paint: {
            "circle-color": "#ffffff",
            "circle-radius": [
                "interpolate",
                ["linear"],
                ["zoom"],
                5, 2,
                10, 4,
                14, 7,
                18, 14
            ],
            "circle-stroke-width": 1,
            "circle-stroke-color": "#ff3333",
            "circle-opacity": 0.75
        }
    });

    loadSubstationsIntoMap();

    map.addSource("topology", {
        type: "geojson",
        data: currentGeoJSON
    });

    map.addLayer({
        id: "overall_boundary_fill",
        type: "fill",
        source: "topology",
        filter: ["==", "type", "array_boundary"],
        paint: {
            "fill-color": "#0066ff",
            "fill-opacity": 0.25
        }
    });

    map.addLayer({
        id: "overall_boundary_line",
        type: "line",
        source: "topology",
        filter: ["==", "type", "array_boundary"],
        paint: {
            "line-color": "#0066ff",
            "line-width": 2,
            "line-dasharray": [4, 4]
        }
    });

    map.addLayer({
        id: "footprints",
        type: "fill",
        source: "topology",
        filter: [
            "in",
            ["get", "type"],
            ["literal", ["skid_footprint", "central_footprint", "bess_footprint"]]
        ],
        paint: {
            "fill-color": [
                "match",
                ["get", "type"],
                "skid_footprint", "#00ffff",
                "central_footprint", "#ff9900",
                "bess_footprint", "#ff00aa",
                "#000000"
            ],
            "fill-opacity": 0.15
        }
    });

    map.addLayer({
        id: "footprints_outline",
        type: "line",
        source: "topology",
        filter: [
            "in",
            ["get", "type"],
            ["literal", ["skid_footprint", "central_footprint", "bess_footprint"]]
        ],
        paint: {
            "line-color": [
                "match",
                ["get", "type"],
                "skid_footprint", "#00ffff",
                "central_footprint", "#ff9900",
                "bess_footprint", "#ff00aa",
                "#000000"
            ],
            "line-width": 1
        }
    });

    map.addLayer({
        id: "radial_spine",
        type: "line",
        source: "topology",
        filter: ["==", "type", "33kv_radial"],
        paint: {
            "line-color": "#00ffff",
            "line-width": 2
        }
    });

    map.addLayer({
        id: "inverters",
        type: "circle",
        source: "topology",
        filter: [
            "in",
            ["get", "type"],
            ["literal", ["string_substation", "central_inverter", "mv_station", "bess_compound"]]
        ],
        paint: {
            "circle-color": [
                "match",
                ["get", "type"],
                "string_substation", "#ffff00",
                "central_inverter", "#ff9900",
                "mv_station", "#6633ff",
                "bess_compound", "#ff00aa",
                "#ffffff"
            ],
            "circle-radius": [
                "match",
                ["get", "type"],
                "string_substation", 4,
                "central_inverter", 6,
                "mv_station", 4,
                "bess_compound", 6,
                3
            ],
            "circle-stroke-color": "#000000",
            "circle-stroke-width": 1
        }
    });

    map.addLayer({
        id: "substation",
        type: "circle",
        source: "topology",
        filter: ["==", "type", "primary_sub"],
        paint: {
            "circle-color": "#ff3333",
            "circle-radius": 8,
            "circle-stroke-color": "#ffffff",
            "circle-stroke-width": 2
        }
    });

    map.on("click", "l-subs", function(e) {
        const f = e.features && e.features[0];
        if (!f || !f.geometry || !Array.isArray(f.geometry.coordinates)) return;

        const coords = f.geometry.coordinates.slice();
        const p = f.properties || {};

        selectedSubstation = {
            name: p.name_clean || p.name || p.Name || p.SiteName || p["Site Name"] || p.substation || p.Substation || "Selected Substation",
            voltage: p.voltage_clean || p.voltage || p.Voltage || p.kv || p.kV || p.KV || "Unknown",
            properties: p,
            coordinates: coords
        };

        activeDrawCenter = coords;

        updateSelectedSubstationDisplay();
        computeAndDraw();

        showPopup(coords, `
            <div style="margin-bottom: 5px; color:#ff3333; font-weight:bold; font-size: 13px; text-transform:uppercase;">Grid Node</div>
            <div class="popup-row"><span>Name:</span><span class="popup-val" style="color:#fff;">${selectedSubstation.name}</span></div>
            <div class="popup-row"><span>Voltage:</span><span class="popup-val" style="color:#fff;">${selectedSubstation.voltage}</span></div>
            <div class="popup-row"><span>Longitude:</span><span class="popup-val" style="color:#fff;">${Number(coords[0]).toFixed(6)}</span></div>
            <div class="popup-row"><span>Latitude:</span><span class="popup-val" style="color:#fff;">${Number(coords[1]).toFixed(6)}</span></div>
        `);
    });

    map.on("mouseenter", "l-subs", () => {
        map.getCanvas().style.cursor = "pointer";
    });

    map.on("mouseleave", "l-subs", () => {
        map.getCanvas().style.cursor = "";
    });

    map.on("click", "inverters", function(e) {
        const prop = e.features[0].properties;
        const coords = e.features[0].geometry.coordinates.slice();

        let color = "#00ffff";
        if (prop.type === "central_inverter") color = "#ff9900";
        else if (prop.type === "string_substation") color = "#ffff00";
        else if (prop.type === "bess_compound") color = "#ff00aa";
        else if (prop.type === "mv_station") color = "#6633ff";

        let html = `
            <div style="margin-bottom: 5px; color:${color}; font-weight:bold; font-size: 13px; text-transform:uppercase;">Block Info</div>
            <div class="popup-row"><span>Type:</span><span class="popup-val" style="color:#fff;">${prop.type}</span></div>
        `;

        if (prop.type === "bess_compound" && prop.mwh !== undefined) {
            html += `<div class="popup-row"><span>Capacity:</span><span class="popup-val" style="color:#fff;">${prop.mwh} MWh</span></div>`;
        }

        showPopup(coords, html);
    });

    map.on("mouseenter", "inverters", () => {
        map.getCanvas().style.cursor = "pointer";
    });

    map.on("mouseleave", "inverters", () => {
        map.getCanvas().style.cursor = "";
    });

    updateLegend();
    recalcAll();
});

document.getElementById("btn_basemap").addEventListener("click", function() {
    if (!map.getLayer("l-sat")) return;

    satActive = !satActive;

    map.setLayoutProperty("l-sat", "visibility", satActive ? "visible" : "none");

    this.textContent = satActive ? "DARK MATTER VIEW" : "SATELLITE VIEW";
    this.classList.toggle("active", satActive);
});

document.getElementById("btn_subs_toggle").addEventListener("click", function() {
    if (!map.getLayer("l-subs")) return;

    subsVisible = !subsVisible;

    map.setLayoutProperty("l-subs", "visibility", subsVisible ? "visible" : "none");

    this.textContent = subsVisible ? "SUBS ON" : "SUBS OFF";
    this.classList.toggle("active", subsVisible);
});

function applyLogisticsPreset(val, suffix) {
    if (val === "high_density") {
        document.getElementById("mods_pallet" + suffix).value = 33;
        document.getElementById("mods_container" + suffix).value = 594;
    } else if (val === "legacy") {
        document.getElementById("mods_pallet" + suffix).value = 31;
        document.getElementById("mods_container" + suffix).value = 620;
    }

    recalcAll();
}

function switchTab(tab) {
    activeTab = tab;

    document.getElementById("tabbtn_string").classList.toggle("active", tab === "string");
    document.getElementById("tabbtn_central").classList.toggle("active", tab === "central");
    document.getElementById("string_tab").classList.toggle("active", tab === "string");
    document.getElementById("central_tab").classList.toggle("active", tab === "central");

    const btnDraw = document.getElementById("btn_draw");

    if (tab === "central") {
        btnDraw.classList.add("central");
    } else {
        btnDraw.classList.remove("central");
    }

    document.querySelectorAll(".central-only").forEach(el => {
        el.style.display = tab === "central" ? "flex" : "none";
    });

    updateLegend();

    if (activeDrawCenter) {
        computeAndDraw();
    }

    recalcAll();
}

function updateLegend() {
    const legend = document.getElementById("map_legend");

    let html = `
        <div class="legend-item"><div class="swatch" style="background:var(--substation);"></div> Primary Substation</div>
        <div class="legend-item"><div class="swatch" style="background:#ffffff; border-color:#ff3333;"></div> Atlas Substation Dataset</div>
        <div class="legend-item"><div class="swatch" style="background:var(--bess);"></div> BESS Compound</div>
        <div class="legend-item"><div class="swatch" style="background:var(--array-blue); opacity: 0.3; border-style: dashed;"></div> Total Array Boundary</div>
    `;

    if (activeTab === "string") {
        html += `
            <div class="legend-item"><div class="swatch" style="background:var(--inverter);"></div> String Substation Block</div>
            <div class="legend-item"><div class="swatch" style="background:transparent; border-color:var(--accent); border-bottom: 2px solid var(--accent);"></div> Radial 33kV Spine</div>
        `;
    } else {
        html += `
            <div class="legend-item"><div class="swatch" style="background:var(--accent-alt);"></div> Central Inverter Block</div>
            <div class="legend-item"><div class="swatch" style="background:transparent; border-color:var(--accent); border-bottom: 2px solid var(--accent);"></div> Radial 33kV Spine</div>
        `;
    }

    legend.innerHTML = html;
}

function updateSelectedSubstationDisplay() {
    const nameEl = document.getElementById("out_selected_sub_name");
    const voltageEl = document.getElementById("out_selected_sub_voltage");
    const lonEl = document.getElementById("out_selected_sub_lon");
    const latEl = document.getElementById("out_selected_sub_lat");

    if (!nameEl || !voltageEl || !lonEl || !latEl) return;

    if (!selectedSubstation) {
        nameEl.textContent = "None selected";
        voltageEl.textContent = "Unknown";
        lonEl.textContent = "n/a";
        latEl.textContent = "n/a";
        return;
    }

    nameEl.textContent = selectedSubstation.name || "Selected Substation";
    voltageEl.textContent = selectedSubstation.voltage || "Unknown";
    lonEl.textContent = selectedSubstation.coordinates ? Number(selectedSubstation.coordinates[0]).toFixed(6) : "n/a";
    latEl.textContent = selectedSubstation.coordinates ? Number(selectedSubstation.coordinates[1]).toFixed(6) : "n/a";
}

async function searchLocation() {
    const query = document.getElementById("loc_search").value;
    if (!query) return;

    try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`);
        const data = await res.json();

        if (data && data.length > 0) {
            map.flyTo({
                center: [parseFloat(data[0].lon), parseFloat(data[0].lat)],
                zoom: 14
            });
        }
    } catch (e) {
        console.error("Geocoding failed:", e);
    }
}

function triggerDrawAtCenter() {
    selectedSubstation = null;
    activeDrawCenter = [map.getCenter().lng, map.getCenter().lat];

    computeAndDraw();
    updateSelectedSubstationDisplay();
}

function updateAggregatesOnly() {
    if (activeTab === "string") return updateStringAggregates();
    return updateCentralAggregates();
}

function zeroStats(dc_ac_ratio, mods_pallet, mods_container) {
    return {
        total_blocks: 0,
        block_ground_area_m2: 0,
        dc_mwp: 0,
        ac_mw: 0,
        module_count: 0,
        net_mod_area_m2: 0,
        net_array_area_m2: 0,
        gross_site_area_m2: 0,
        dc_ac_ratio,
        pallets: 0,
        containers: 0,
        spares_pct: 0,
        modules_inc_spares: 0,
        pallets_inc_spares: 0,
        containers_inc_spares: 0,
        mods_pallet,
        mods_container,
        combiner_boxes_per_inverter: 0,
        total_combiner_boxes: 0
    };
}

function updateStringAggregates() {
    const mod_wp = parseFloat(document.getElementById("mod_wp").value) || 0;
    const x = parseInt(document.getElementById("x_mods").value) || 0;
    const z = parseInt(document.getElementById("z_strings").value) || 0;
    const y = parseInt(document.getElementById("y_invs").value) || 0;
    const s = parseInt(document.getElementById("s_subs").value) || 0;
    const rings = parseInt(document.getElementById("b_cols").value) || 0;

    const mod_l = parseFloat(document.getElementById("mod_l").value) || 0;
    const mod_w = parseFloat(document.getElementById("mod_w").value) || 0;
    const gcr = parseFloat(document.getElementById("mounting_type").value) || 0.75;
    const dc_ac_ratio = parseFloat(document.getElementById("dc_ac_ratio").value) || 1.20;
    const gross_factor = parseFloat(document.getElementById("gross_factor").value) || 1.35;

    const mods_pallet = parseInt(document.getElementById("mods_pallet").value) || 1;
    const mods_container = parseInt(document.getElementById("mods_container").value) || 1;
    const spare_pct = parseFloat(document.getElementById("spare_pct").value) || 0;

    if (mod_wp <= 0 || mod_l <= 0 || mod_w <= 0 || x <= 0) {
        return zeroStats(dc_ac_ratio, mods_pallet, mods_container);
    }

    const total_blocks = rings * s;
    const total_invs = total_blocks * y;
    const module_count = total_invs * z * x;
    const dc_mwp = (module_count * mod_wp) / 1000000;
    const ac_mw = dc_ac_ratio > 0 ? dc_mwp / dc_ac_ratio : 0;

    const net_mod_area_m2 = module_count * mod_l * mod_w;
    const net_array_area_m2 = gcr > 0 ? net_mod_area_m2 / gcr : 0;
    const gross_site_area_m2 = net_array_area_m2 * gross_factor;
    const block_ground_area_m2 = total_blocks > 0 ? net_array_area_m2 / total_blocks : 0;

    const pallets = Math.ceil(module_count / mods_pallet);
    const containers = Math.ceil(module_count / mods_container);
    const modules_inc_spares = Math.ceil(module_count * (1 + spare_pct / 100));
    const pallets_inc_spares = Math.ceil(modules_inc_spares / mods_pallet);
    const containers_inc_spares = Math.ceil(modules_inc_spares / mods_container);

    return {
        total_blocks,
        block_ground_area_m2,
        dc_mwp,
        ac_mw,
        module_count,
        net_mod_area_m2,
        net_array_area_m2,
        gross_site_area_m2,
        dc_ac_ratio,
        pallets,
        containers,
        spares_pct: spare_pct,
        modules_inc_spares,
        pallets_inc_spares,
        containers_inc_spares,
        mods_pallet,
        mods_container,
        combiner_boxes_per_inverter: 0,
        total_combiner_boxes: 0
    };
}

function updateCentralAggregates() {
    const mod_wp = parseFloat(document.getElementById("mod_wp_c").value) || 0;
    const mod_l = parseFloat(document.getElementById("mod_l_c").value) || 0;
    const mod_w = parseFloat(document.getElementById("mod_w_c").value) || 0;
    const gcr = parseFloat(document.getElementById("mounting_type_c").value) || 0.45;
    const gross_factor = parseFloat(document.getElementById("gross_factor_c").value) || 1.35;

    const x_mods = parseInt(document.getElementById("x_mods_c").value) || 0;
    const inv_ac_mw = parseFloat(document.getElementById("inv_ac_mw_c").value) || 0;
    const dc_ac_ratio = parseFloat(document.getElementById("dc_ac_ratio_c").value) || 1.20;

    const str_per_cb = parseInt(document.getElementById("str_per_cb_c").value) || 1;
    const inv_per_mv = parseInt(document.getElementById("inv_per_mv_c").value) || 0;
    const mv_per_ring = parseInt(document.getElementById("mv_per_ring_c").value) || 0;
    const rings = parseInt(document.getElementById("rings_c").value) || 0;

    const mods_pallet = parseInt(document.getElementById("mods_pallet_c").value) || 1;
    const mods_container = parseInt(document.getElementById("mods_container_c").value) || 1;
    const spare_pct = parseFloat(document.getElementById("spare_pct_c").value) || 0;

    if (mod_wp <= 0 || mod_l <= 0 || mod_w <= 0 || x_mods <= 0) {
        return zeroStats(dc_ac_ratio, mods_pallet, mods_container);
    }

    const str_dc_kwp = (x_mods * mod_wp) / 1000;
    const inv_dc_mwp = inv_ac_mw * dc_ac_ratio;
    const req_strings = str_dc_kwp > 0 ? Math.ceil((inv_dc_mwp * 1000) / str_dc_kwp) : 0;

    const combiner_boxes_per_inverter = Math.ceil(req_strings / str_per_cb);
    const total_blocks = inv_per_mv * mv_per_ring * rings;
    const total_combiner_boxes = combiner_boxes_per_inverter * total_blocks;

    const module_count = req_strings * x_mods * total_blocks;

    const dc_mwp = (module_count * mod_wp) / 1000000;
    const ac_mw = total_blocks * inv_ac_mw;

    const net_mod_area_m2 = module_count * mod_l * mod_w;
    const net_array_area_m2 = gcr > 0 ? net_mod_area_m2 / gcr : 0;
    const gross_site_area_m2 = net_array_area_m2 * gross_factor;
    const block_ground_area_m2 = total_blocks > 0 ? net_array_area_m2 / total_blocks : 0;

    const pallets = Math.ceil(module_count / mods_pallet);
    const containers = Math.ceil(module_count / mods_container);
    const modules_inc_spares = Math.ceil(module_count * (1 + spare_pct / 100));
    const pallets_inc_spares = Math.ceil(modules_inc_spares / mods_pallet);
    const containers_inc_spares = Math.ceil(modules_inc_spares / mods_container);

    return {
        total_blocks,
        block_ground_area_m2,
        dc_mwp,
        ac_mw,
        module_count,
        net_mod_area_m2,
        net_array_area_m2,

function updateBenchmark() {

}

function n(id) {
    return parseFloat(document.getElementById(id)?.value) || 0;
}

function money(v) {
    const rounded = Math.round(v);
    if (rounded < 0) return "-£" + Math.abs(rounded).toLocaleString();
    return "£" + rounded.toLocaleString();
}

function parseFormattedMoney(str) {
    if (!str) return 0;

    const isNegative = str.includes("-");
    const numericVal = parseFloat(str.replace(/[^\d.]/g, "")) || 0;

    return isNegative ? -numericVal : numericVal;
}

function calcCumulativeGeneration(dc_mwp, effectiveYieldVal, totalLossPct, degPct, years) {
    const year1 = dc_mwp * effectiveYieldVal * (1 - totalLossPct / 100);

    let total = 0;

    for (let y = 1; y <= years; y++) {
        total += year1 * Math.pow(1 - degPct / 100, y - 1);
    }

    return total;
}

function updateFinancials(prefix, dc_mwp, ac_mw, stats) {
    const price = n(prefix + "_price");
    const other = n(prefix + "_other");
    const yieldVal = n(prefix + "_yield");
    const bifacial = n(prefix + "_bifacial");
    const baseLoss = n(prefix + "_losses");
    const deg = n(prefix + "_deg");
    const opexRate = n(prefix + "_opex");

    const epcEx = n(prefix + "_epc_ex");

    const floodChecked = document.getElementById(prefix + "_flood")?.checked || false;
    const floodRate = n(prefix + "_flood_rate");
    const floodAdder = floodChecked ? floodRate : 0;

    const modules = n(prefix + "_modules");
    const otherCapex = n(prefix + "_other_capex");
    const fixedCapex = n(prefix + "_fixed_capex");
    const cont = n(prefix + "_cont");

    const lossDcString = n(prefix + "_loss_dc_string");
    const lossLvDc = n(prefix + "_loss_lv_dc");
    const lossLvAc = n(prefix + "_loss_lv_ac");
    const lossTx = n(prefix + "_loss_tx");
    const lossOther = n(prefix + "_loss_other");

    const totalLoss = baseLoss + lossDcString + lossLvDc + lossLvAc + lossTx + lossOther;

    const bessMw = n(prefix + "_bess_mw");
    const bessMwh = n(prefix + "_bess_mwh");
    const bessCapexRate = n(prefix + "_bess_capex");
    const bessCycles = n(prefix + "_bess_cycles");
    const bessSpread = n(prefix + "_bess_spread");
    const bessEff = n(prefix + "_bess_eff") / 100;

    const safeLoss = Math.min(Math.max(totalLoss, 0), 100);
    const safeBessEff = Math.min(Math.max(bessEff, 0), 1);

    const effectiveYield = yieldVal * (1 + bifacial / 100);

    const year1Gen = dc_mwp * effectiveYield * (1 - safeLoss / 100);

    const annualSolarRevenue = year1Gen * (price + other);
    const bessAnnualValue = bessMwh * bessCycles * bessSpread * safeBessEff;

    const bess25 = bessAnnualValue * 25;
    const bess35 = bessAnnualValue * 35;

    const gen25 = calcCumulativeGeneration(dc_mwp, effectiveYield, safeLoss, deg, 25);
    const gen35 = calcCumulativeGeneration(dc_mwp, effectiveYield, safeLoss, deg, 35);

    const revenue25 = gen25 * (price + other) + bess25;
    const revenue35 = gen35 * (price + other) + bess35;

    const annualRevenue = annualSolarRevenue + bessAnnualValue;

    const annualOpex = ac_mw * opexRate;
    const opex25 = annualOpex * 25;
    const opex35 = annualOpex * 35;

    const baseCapexWp = epcEx + modules + otherCapex + floodAdder;
    const baseCapex = dc_mwp * 1000000 * baseCapexWp;
    const contingency = baseCapex * (cont / 100);

    const bessCapex = bessMwh * bessCapexRate;

    const totalCapex = baseCapex + contingency + fixedCapex + bessCapex;
    const capexPerWp = dc_mwp > 0 ? totalCapex / (dc_mwp * 1000000) : 0;

    const surplus25 = revenue25 - opex25 - totalCapex;
    const surplus35 = revenue35 - opex35 - totalCapex;

    document.getElementById(prefix + "_annual_rev").textContent = money(annualRevenue);
    document.getElementById(prefix + "_25_rev").textContent = money(revenue25);
    document.getElementById(prefix + "_35_rev").textContent = money(revenue35);
    document.getElementById(prefix + "_capex").textContent = money(totalCapex);
    document.getElementById(prefix + "_capex_wp").textContent = "£" + capexPerWp.toFixed(2) + "/Wp";
    document.getElementById(prefix + "_surplus_25").textContent = money(surplus25);
    document.getElementById(prefix + "_surplus_35").textContent = money(surplus35);

    updateFinanceWarnings(
        prefix,
        price,
        opexRate,
        epcEx + modules,
        capexPerWp,
        totalLoss,
        bessMw,
        bessMwh,
        bessCycles,
        bessEff,
        bifacial,
        stats
    );
}

function updateFinanceWarnings(prefix, price, opexRate, epcIncModules, capexPerWp, totalLoss, bessMw, bessMwh, bessCycles, bessEff, bifacial, stats) {
    const warnings = [];

    if (price < 0) warnings.push("Energy price cannot be negative.");
    if (opexRate < 0) warnings.push("OPEX cannot be negative.");
    if (totalLoss < 0) warnings.push("Losses cannot be negative.");
    if (epcIncModules < 0) warnings.push("EPC cannot be negative.");
    if (capexPerWp < 0) warnings.push("CAPEX cannot be negative.");
    if (bessMwh < 0 || bessMw < 0) warnings.push("BESS size cannot be negative.");
    if (bessMwh > 0 && bessEff <= 0) warnings.push("BESS efficiency missing.");
    if (bessEff > 1) warnings.push("BESS efficiency above 100 percent.");

    if (price < 50) warnings.push("Low energy price case.");
    if (price > 85) warnings.push("High energy price case.");
    if (epcIncModules < 0.42) warnings.push("Aggressive EPC pricing.");
    if (capexPerWp > 1.00) warnings.push("Full project cost territory.");
    if (capexPerWp > 1.25) warnings.push("Complex project or asset value territory.");
    if (opexRate < 10000 && opexRate >= 0) warnings.push("OPEX may be unrealistically low.");
    if (totalLoss > 6) warnings.push("High loss assumption.");
    if (bifacial > 12) warnings.push("Aggressive bifacial gain assumption.");
    if (bessMwh > 0 && bessMw <= 0) warnings.push("BESS MW missing.");
    if (bessMw > 0 && bessMwh / bessMw > 8) warnings.push("Unusually long BESS duration.");
    if (bessCycles > 365) warnings.push("Aggressive storage cycling assumption.");

    if (
        n(prefix + "_loss_dc_string") === 0 &&
        n(prefix + "_loss_lv_dc") === 0 &&
        n(prefix + "_loss_lv_ac") === 0 &&
        n(prefix + "_loss_tx") === 0 &&
        n(prefix + "_loss_other") === 0
    ) {
        warnings.push("Specialist electrical loss fields are blank or zero. Revenue may be overstated until cable, transformer and electrical design losses are verified.");
    }

    const grossFactor = activeTab === "string" ? n("gross_factor") : n("gross_factor_c");

    if (grossFactor < 1.15) {
        warnings.push("Gross site factor may be too low for roads, buffers, substations, drainage and ecology.");
    }

    if (stats.mods_pallet <= 0 || stats.mods_container <= 0) {
        warnings.push("Module logistics assumptions are missing.");
    }

    document.getElementById(prefix + "_warnings").innerHTML = warnings.join("<br>");
}

function updateActiveFinancials(stats = null) {
    const activeStats = stats || updateAggregatesOnly();

    if (activeTab === "string") {
        updateFinancials("fin_string", activeStats.dc_mwp, activeStats.ac_mw, activeStats);
    } else {
        updateFinancials("fin_central", activeStats.dc_mwp, activeStats.ac_mw, activeStats);
    }
}

function getRectPolygon(centerCoord, width_km, length_km, propType) {
    const pt = turf.point(centerCoord);

    const ptNorth = turf.destination(pt, length_km / 2, 0, { units: "kilometers" }).geometry.coordinates;
    const ptSouth = turf.destination(pt, length_km / 2, 180, { units: "kilometers" }).geometry.coordinates;

    const nw = turf.destination(turf.point(ptNorth), width_km / 2, -90, { units: "kilometers" }).geometry.coordinates;
    const ne = turf.destination(turf.point(ptNorth), width_km / 2, 90, { units: "kilometers" }).geometry.coordinates;
    const se = turf.destination(turf.point(ptSouth), width_km / 2, 90, { units: "kilometers" }).geometry.coordinates;
    const sw = turf.destination(turf.point(ptSouth), width_km / 2, -90, { units: "kilometers" }).geometry.coordinates;

    return turf.polygon([[nw, ne, se, sw, nw]], { type: propType });
}

function computeAndDraw() {
    if (!activeDrawCenter) return;

    const stats = updateAggregatesOnly();

    const N = stats.total_blocks;

    if (N === 0) {
        updateActiveFinancials(stats);
        updateTechnicalSummary(stats);
        return;
    }

    const cols = Math.ceil(Math.sqrt(N));
    const rows = Math.ceil(N / cols);

    const block_area_km2 = stats.block_ground_area_m2 / 1000000;

    const mounting_val = activeTab === "string"
        ? document.getElementById("mounting_type").value
        : document.getElementById("mounting_type_c").value;

    let aspect = 1.4;

    if (mounting_val === "0.45") aspect = 1 / 1.4;
    else if (mounting_val === "0.75") aspect = 1.0;

    const block_w = Math.sqrt(block_area_km2 / aspect);
    const block_l = block_w * aspect;

    const spacing = 0.01;

    const grid_w = cols * block_w + (cols - 1) * spacing;
    const grid_l = rows * block_l + (rows - 1) * spacing;

    const features = [];
    const subPt = turf.point(activeDrawCenter);

    features.push(turf.point(activeDrawCenter, {
        type: "primary_sub",
        selected_substation_name: selectedSubstation?.name || null,
        selected_substation_voltage: selectedSubstation?.voltage || null
    }));

    const gridCenter = turf.destination(subPt, grid_l / 2 + 0.05, 0, { units: "kilometers" }).geometry.coordinates;

    features.push(getRectPolygon(gridCenter, grid_w + 0.02, grid_l + 0.02, "array_boundary"));

    const ptN = turf.destination(turf.point(gridCenter), grid_l / 2, 0, { units: "kilometers" }).geometry.coordinates;
    const ptNW = turf.destination(turf.point(ptN), grid_w / 2, -90, { units: "kilometers" }).geometry.coordinates;

    const inverters = [];
    let count = 0;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (count >= N) break;

            const posE = turf.destination(
                turf.point(ptNW),
                c * block_w + c * spacing + block_w / 2,
                90,
                { units: "kilometers" }
            ).geometry.coordinates;

            const finalPos = turf.destination(
                turf.point(posE),
                r * block_l + r * spacing + block_l / 2,
                180,
                { units: "kilometers" }
            ).geometry.coordinates;

            const nodeType = activeTab === "string" ? "string_substation" : "central_inverter";
            const footType = activeTab === "string" ? "skid_footprint" : "central_footprint";

            features.push(getRectPolygon(finalPos, block_w, block_l, footType));

            inverters.push({ coords: finalPos, type: nodeType });
            features.push(turf.point(finalPos, { type: nodeType }));

            count++;
        }
    }

    const prefix = activeTab === "string" ? "fin_string" : "fin_central";
    const bess_mwh = parseFloat(document.getElementById(prefix + "_bess_mwh")?.value) || 0;

    if (bess_mwh > 0) {
        const bess_area_km2 = bess_mwh * 85 / 1000000;
        const bess_aspect = 2.5;

        const bess_w = Math.sqrt(bess_area_km2 * bess_aspect);
        const bess_l = bess_area_km2 / bess_w;

        const bessCenter = turf.destination(subPt, bess_w / 2 + 0.05, -90, { units: "kilometers" }).geometry.coordinates;

        features.push(getRectPolygon(bessCenter, bess_w, bess_l, "bess_footprint"));
        features.push(turf.point(bessCenter, { type: "bess_compound", mwh: bess_mwh }));
        features.push(turf.lineString([bessCenter, activeDrawCenter], { type: "33kv_radial" }));
    }

    if (inverters.length > 0) {
        let spineN = -90;
        let spineS = 90;

        inverters.forEach(inv => {
            if (inv.coords[1] > spineN) spineN = inv.coords[1];
            if (inv.coords[1] < spineS) spineS = inv.coords[1];
        });

        if (activeDrawCenter[1] > spineN) spineN = activeDrawCenter[1];
        if (activeDrawCenter[1] < spineS) spineS = activeDrawCenter[1];

        const spineCoords = [
            [activeDrawCenter[0], spineS],
            [activeDrawCenter[0], spineN]
        ];

        features.push(turf.lineString(spineCoords, { type: "33kv_radial" }));

        inverters.forEach(inv => {
            const branchCoords = [
                inv.coords,
                [activeDrawCenter[0], inv.coords[1]]
            ];

            features.push(turf.lineString(branchCoords, { type: "33kv_radial" }));
        });
    }

    currentGeoJSON = turf.featureCollection(features);

    if (map.getSource("topology")) {
        map.getSource("topology").setData(currentGeoJSON);
    }

    if (features.length > 0) {
        const bbox = turf.bbox(currentGeoJSON);
        map.fitBounds(bbox, {
            padding: 60,
            duration: 800
        });
    }

    updateActiveFinancials(stats);
    updateTechnicalSummary(stats);
}

function autoFillBifacial(val, elId) {
    let bifacial = 0;

    if (val === "0.35") bifacial = 8;
    else if (val === "0.45") bifacial = 5;
    else if (val === "0.75") bifacial = 2;

    const inputEl = document.getElementById(elId);

    if (inputEl) {
        inputEl.value = bifacial;
        inputEl.dispatchEvent(new Event("input", { bubbles: true }));
    }
}

document.getElementById("mounting_type").addEventListener("change", function(e) {
    autoFillBifacial(e.target.value, "fin_string_bifacial");
});

document.getElementById("mounting_type_c").addEventListener("change", function(e) {
    autoFillBifacial(e.target.value, "fin_central_bifacial");
});
