name: V5 DC AC LV 01 HTML

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  install-html:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install DC AC LV topology HTML
        run: python solar-bess-topology-v5/install_dc_ac_lv_01_html.py

      - name: Commit DC AC LV topology HTML
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Install DC AC LV topology HTML
          file_pattern: solar-bess-topology-v5/dc-ac-lv-topology-review-v5.html
