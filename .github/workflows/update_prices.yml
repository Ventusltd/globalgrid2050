name: update-metal-prices
on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6am
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/update_prices.py
      - name: Commit and Push
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"
          git add 33kv_uk_dap_price_estimator/index.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated price update" && git push origin main)
