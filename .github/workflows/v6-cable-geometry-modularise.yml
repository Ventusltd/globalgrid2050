name: V6 Cable Geometry Modularise

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  modularise-v6-cable-geometry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GRIDBOT_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run V6 cable geometry modularisation
        run: |
          python scripts/modularise_v6_cable_geometry.py

      - name: Commit and push changes
        env:
          PAT: ${{ secrets.GRIDBOT_PAT }}
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"

          git add solar-bess-topology-v6/cable-geometry-visualiser gridbot_reports/v6_cable_geometry_modularisation_phase_1.md

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Modularise V6 cable geometry visualiser"
            git push https://${PAT}@github.com/${{ github.repository }}.git HEAD:main
          else
            echo "No changes to commit"
          fi
