name: Add V4 Detailed Disclaimer

on:
  push:
    paths:
      - "scripts/add_v4_detailed_disclaimer.py"
      - ".github/workflows/add-v4-detailed-disclaimer.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-v4-detailed-disclaimer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main before editing
        run: git pull --ff-only origin main

      - name: Add detailed disclaimer below financial logic
        run: python scripts/add_v4_detailed_disclaimer.py

      - name: Commit detailed disclaimer
        run: |
          git config user.name "GridBot"
          git config user.email "gridbot@users.noreply.github.com"
          git add solar-bess-topology-v4/indexforgis-sld-v4.html gridbot_reports/v4_detailed_disclaimer_below_financial_logic.md
          if git diff --cached --quiet; then
            echo "No disclaimer changes to commit."
          else
            git commit -m "Add detailed V4 screening disclaimer"
            git push
          fi
