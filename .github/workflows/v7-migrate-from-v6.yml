name: V7 Migrate From V6

on:
  workflow_dispatch:
    inputs:
      overwrite:
        description: "Overwrite existing solar-bess-topology-v7 folder if it already exists"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  migrate-v7:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GRIDBOT_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create V7 workspace from V6
        run: |
          if [ "${{ github.event.inputs.overwrite }}" = "true" ]; then
            python scripts/v7_migrate_from_v6.py --overwrite
          else
            python scripts/v7_migrate_from_v6.py
          fi

      - name: Commit and push V7 migration
        env:
          PAT: ${{ secrets.GRIDBOT_PAT }}
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"

          git pull --rebase --autostash origin main
          git add solar-bess-topology-v7 scripts/v7_migrate_from_v6.py gridbot_reports/v7_migration_from_v6.md

          if git diff --cached --quiet; then
            echo "No V7 migration changes to commit."
            exit 0
          fi

          git commit -m "Create V7 workspace from V6"
          git pull --rebase --autostash origin main
          git push https://${PAT}@github.com/${{ github.repository }}.git HEAD:main
