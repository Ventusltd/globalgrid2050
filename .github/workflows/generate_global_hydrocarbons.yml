name: Generate Unified Global Hydrocarbons

on:
  workflow_dispatch: # Allows you to manually trigger it after uploading a new GEM CSV
  schedule:
    - cron: '0 4 4 * *' # Runs at 04:00 on the 4th of every month

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Unified Hydrocarbon ETL Pipeline
        run: python fetch_global_hydrocarbons.py

      - name: Commit and Push GeoJSON Cartridge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Ventus-OS-Agent"
          git config --global user.email "actions@github.com"
          git add global_hydrocarbons.geojson
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(data): unified GEM and OSM hydrocarbon datasets" && git push)
