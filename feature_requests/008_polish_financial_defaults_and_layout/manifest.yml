name: Polish Financial Defaults and Layout
summary: Moderates default EPC, Owner, and Grid Connection costs to realistic mid-market figures and fixes the Development Stage dropdown layout.

operations:
  - type: replace
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    find: '<div class="input-group"><label>EPC Cost £/MW</label><input type="number" id="fin_string_dev_epc_mw" value="600000" step="25000" min="0"></div>'
    replace: '<div class="input-group"><label>EPC Cost £/MW</label><input type="number" id="fin_string_dev_epc_mw" value="500000" step="25000" min="0"></div>'

  - type: replace
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    find: '<div class="input-group"><label>EPC Cost £/MW</label><input type="number" id="fin_central_dev_epc_mw" value="600000" step="25000" min="0"></div>'
    replace: '<div class="input-group"><label>EPC Cost £/MW</label><input type="number" id="fin_central_dev_epc_mw" value="500000" step="25000" min="0"></div>'

  - type: replace
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    find: '<div class="input-group"><label>Other Owner Costs £/MW</label><input type="number" id="fin_string_dev_owner_mw" value="200000" step="25000" min="0"></div>'
    replace: '<div class="input-group"><label>Other Owner Costs £/MW</label><input type="number" id="fin_string_dev_owner_mw" value="100000" step="25000" min="0"></div>'

  - type: replace
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    find: '<div class="input-group"><label>Other Owner Costs £/MW</label><input type="number" id="fin_central_dev_owner_mw" value="200000" step="25000" min="0"></div>'
    replace: '<div class="input-group"><label>Other Owner Costs £/MW</label><input type="number" id="fin_central_dev_owner_mw" value="100000" step="25000" min="0"></div>'

  - type: replace
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    find: '<div class="input-group"><label>Grid Connection Cost £ per Megawatt (MW)</label><input type="number" id="fin_string_dev_grid_mw" value="200000" step="25000" min="0"></div>'
    replace: '<div class="input-group"><label>Grid Connection Cost £ per Megawatt (MW)</label><input type="number" id="fin_string_dev_grid_mw" value="100000" step="25000" min="0"></div>'

  - type: replace
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    find: '<div class="input-group"><label>Grid Connection Cost £ per Megawatt (MW)</label><input type="number" id="fin_central_dev_grid_mw" value="200000" step="25000" min="0"></div>'
    replace: '<div class="input-group"><label>Grid Connection Cost £ per Megawatt (MW)</label><input type="number" id="fin_central_dev_grid_mw" value="100000" step="25000" min="0"></div>'

  - type: replace
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    find: |
      <div class="input-group">
          <label>Development Stage</label>
          <select id="fin_string_dev_stage" data-dev-stage-prefix="fin_string">
    replace: |
      <div class="input-group" style="display: block; margin-bottom: 8px;">
          <label style="margin-bottom: 4px; display: block;">Development Stage</label>
          <select id="fin_string_dev_stage" data-dev-stage-prefix="fin_string" style="width: 100%;">

  - type: replace
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    find: |
      <div class="input-group">
          <label>Development Stage</label>
          <select id="fin_central_dev_stage" data-dev-stage-prefix="fin_central">
    replace: |
      <div class="input-group" style="display: block; margin-bottom: 8px;">
          <label style="margin-bottom: 4px; display: block;">Development Stage</label>
          <select id="fin_central_dev_stage" data-dev-stage-prefix="fin_central" style="width: 100%;">

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'fin_string_dev_epc_mw" value="500000"'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'fin_central_dev_epc_mw" value="500000"'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'fin_string_dev_owner_mw" value="100000"'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'fin_central_dev_owner_mw" value="100000"'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'fin_string_dev_grid_mw" value="100000"'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'fin_central_dev_grid_mw" value="100000"'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'select id="fin_string_dev_stage" data-dev-stage-prefix="fin_string" style="width: 100%;"'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'select id="fin_central_dev_stage" data-dev-stage-prefix="fin_central" style="width: 100%;"'
