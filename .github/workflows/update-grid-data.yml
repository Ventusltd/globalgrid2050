name: fetch-national-grid-data

on:
  workflow_dispatch: # This allows you to run it manually

permissions:
  contents: write

jobs:
  fetch-grid:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GRIDBOT_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Grid Fetcher
        run: python scripts/fetch_grid_data.py

      - name: Commit and push changes
        env:
          PAT: ${{ secrets.GRIDBOT_PAT }}
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"
          git add grid_400kv.geojson
          git add grid_275kv.geojson
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Automated grid data fetch from Overpass API"
            git push https://${PAT}@github.com/${{ github.repository }}.git HEAD:main
          else
            echo "No changes to commit"
          fi
