name: Fetch UK Heavy Emitters and Polluters
on:
  schedule:
    - cron: '0 6 1 1 *'
    - cron: '0 6 1 4 *'
    - cron: '0 6 1 7 *'
    - cron: '0 6 1 10 *'
  workflow_dispatch:
jobs:
  update-heavy-emitters:
    name: Fetch and Map UK Heavy Emitters and Polluters
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests openpyxl pyproj beautifulsoup4
      - name: 🏭 Fetch UK Heavy Emitters
        run: python repd_grid_atlasv7/scripts/fetch_heavy_emitters_ukv7.py
        env:
          PYTHONPATH: .
      - name: 🛡️ Commit GeoJSON
        run: |
          git config --global user.name "Ventus-Bot"
          git config --global user.email "bot@ventus.ltd"
          git add heavy_emitters_uk.json manifest_heavy_emitters.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "UK Heavy Emitters Update: $(date +'%Y-%m-%d')" && git push)
