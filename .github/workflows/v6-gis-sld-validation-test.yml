name: V6 GIS SLD Validation Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  v6-gis-sld-validation-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GRIDBOT_PAT }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate GIS SLD upgrade manifest and write report
        run: |
          python scripts/v6_complex_upgrade_installer.py \
            --upgrade-id "001_gis_sld_validation_test" \
            --target-app "gis-sld-financial-sandbox" \
            --dry-run "true"

      - name: Commit and push validation report
        env:
          PAT: ${{ secrets.GRIDBOT_PAT }}
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"

          git pull --rebase --autostash origin main
          git add gridbot_reports

          if git diff --cached --quiet; then
            echo "No validation report changes to commit."
            exit 0
          fi

          git commit -m "V6 GIS SLD validation test report"
          git pull --rebase --autostash origin main
          git push https://${PAT}@github.com/${{ github.repository }}.git HEAD:main
