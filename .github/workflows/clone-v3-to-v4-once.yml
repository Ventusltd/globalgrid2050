name: Clone V3 to V4 Once

on:
  push:
    paths:
      - "scripts/clone_v3_to_v4.py"
      - ".github/workflows/clone-v3-to-v4-once.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clone-v3-to-v4:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone V3 folder into V4
        run: python scripts/clone_v3_to_v4.py

      - name: Commit V4 clone
        run: |
          git config user.name "GridBot"
          git config user.email "gridbot@users.noreply.github.com"
          git add solar-bess-topology-v4 gridbot_reports/v4_clone_from_v3_report.md
          if git diff --cached --quiet; then
            echo "No V4 clone changes to commit."
          else
            git commit -m "Clone V3 app into V4 safety baseline"
            git push
          fi
