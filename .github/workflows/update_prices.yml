name: update-metal-prices

on:
  schedule:
    - cron: '0 6 * * *' # Runs at 06:00 UTC daily
  workflow_dispatch:    # Lets you click a "Run" button manually

permissions:
  contents: write       # Crucial: Allows the bot to push changes

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run LV price update
        run: python scripts/update_prices_lv.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"
          
          # Stage the updated file
          git add lv_ac_dc_price_estimator/index.md
          
          # If there are changes, commit and push them
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Automated LV price update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          else
            echo "No changes to commit"
          fi
