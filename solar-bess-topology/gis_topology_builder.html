<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS Topology Engine | GlobalGrid2050</title>
    <script src="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <style>
        :root {
            --bg: #050505; --panel: rgba(10, 10, 10, 0.96); --line: #2f343d;
            --text: #ffffff; --muted: #a6adbb; --accent: #00ffff; --ok: #00ff88;
        }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 20px; background: var(--bg); color: var(--text); font-family: "Courier New", monospace; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .dashboard { display: flex; gap: 20px; width: 100%; max-width: 1600px; height: 100%; }
        .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 4px; display: flex; flex-direction: column; }
        .panel-left { width: 400px; padding: 20px; flex-shrink: 0; overflow-y: auto; }
        .panel-right { flex: 1 1 auto; position: relative; }
        h2 { margin: 0 0 10px 0; color: var(--accent); font-size: 18px; text-transform: uppercase; border-bottom: 1px solid var(--line); padding-bottom: 10px; }
        h3 { margin: 15px 0 5px 0; color: var(--muted); font-size: 12px; text-transform: uppercase; }
        .input-group { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
        .input-group input { width: 100px; background: #111; color: var(--accent); border: 1px solid #444; padding: 6px; text-align: right; border-radius: 3px; font-family: monospace; }
        .stat-box { background: rgba(0, 255, 255, 0.05); border: 1px solid var(--accent); padding: 15px; border-radius: 3px; margin-top: 15px; }
        .stat-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: var(--muted); }
        .stat-val { color: var(--text); font-weight: bold; }
        .stat-val.cyan { color: var(--accent); font-size: 16px; }
        .btn { padding: 12px; background: var(--bg); color: var(--ok); border: 1px solid var(--ok); cursor: pointer; font-family: monospace; font-weight: bold; text-transform: uppercase; border-radius: 3px; margin-top: 15px; width: 100%; }
        .btn:hover { background: var(--ok); color: #000; }
        #map { width: 100%; height: 100%; border-radius: 4px; }
        .legend { position: absolute; bottom: 20px; left: 20px; background: var(--panel); border: 1px solid var(--line); padding: 10px; font-size: 11px; z-index: 1; border-radius: 4px; }
        .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .swatch { width: 12px; height: 12px; border: 1px solid #666; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="panel panel-left">
        <h2>Topology Engine</h2>
        <p style="font-size: 11px; color: var(--muted); margin-top: 0;">Configure hierarchy. Map generates GeoJSON substrate automatically.</p>

        <h3>Module Specs</h3>
        <div class="input-group"><label>Module (Wp)</label><input type="number" id="mod_wp" value="600" /></div>

        <h3>Hierarchy Multipliers</h3>
        <div class="input-group"><label>Mods / String</label><input type="number" id="x_mods" value="28" /></div>
        <div class="input-group"><label>Strings / Inverter</label><input type="number" id="z_strings" value="180" /></div>
        <div class="input-group"><label>Inverters / Sub</label><input type="number" id="y_invs" value="1" /></div>
        <div class="input-group"><label>Subs / Ring</label><input type="number" id="s_subs" value="5" /></div>
        <div class="input-group"><label>33kV Rings</label><input type="number" id="b_cols" value="6" /></div>

        <div class="stat-box">
            <h3 style="margin-top:0; color: var(--accent);">Site Aggregates</h3>
            <div class="stat-row"><span>Inverters:</span><span class="stat-val" id="out_invs">0</span></div>
            <div class="stat-row"><span>Substations:</span><span class="stat-val" id="out_subs">0</span></div>
            <hr style="border-top: 1px solid #333; margin: 10px 0;">
            <div class="stat-row" style="align-items: center;">
                <span>Total DC Capacity:</span><span class="stat-val cyan" id="out_mw">0.00 MWp</span>
            </div>
        </div>

        <button class="btn" onclick="exportGeoJSON()">Export GeoJSON</button>
    </div>

    <div class="panel panel-right">
        <div id="map"></div>
        <div class="legend">
            <div class="legend-item"><div class="swatch" style="background:#ff3333;"></div> 400kV Primary Sub</div>
            <div class="legend-item"><div class="swatch" style="background:#ffff00;"></div> Inverter Skid (Node)</div>
            <div class="legend-item"><div class="swatch" style="background:transparent; border-color:#00ffff;"></div> 33kV Collection Ring</div>
        </div>
    </div>
</div>

<script>
    // Initialize Carto Dark Matter Map via MapLibre
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        center: [0.9350, 51.3340], // Cleve Hill coordinates
        zoom: 14.5 // Perfect zoom for 1000-3000 acre scale
    });

    let currentGeoJSON = { type: "FeatureCollection", features: [] };

    map.on('load', () => {
        map.addSource('topology', { type: 'geojson', data: currentGeoJSON });

        // Draw 33kV Rings (Lines)
        map.addLayer({
            id: 'rings', type: 'line', source: 'topology',
            filter: ['==', 'type', '33kv_ring'],
            paint: { 'line-color': '#00ffff', 'line-width': 2, 'line-dasharray': [2, 2] }
        });

        // Draw Inverter Skids (Yellow Points)
        map.addLayer({
            id: 'inverters', type: 'circle', source: 'topology',
            filter: ['==', 'type', 'inverter'],
            paint: { 'circle-color': '#ffff00', 'circle-radius': 4, 'circle-stroke-color': '#000', 'circle-stroke-width': 1 }
        });

        // Draw Primary Substation (Red Point)
        map.addLayer({
            id: 'substation', type: 'circle', source: 'topology',
            filter: ['==', 'type', 'primary_sub'],
            paint: { 'circle-color': '#ff3333', 'circle-radius': 8, 'circle-stroke-color': '#fff', 'circle-stroke-width': 2 }
        });

        computeAndDraw(); // Initial draw
    });

    // Compute Math and generate Geospatial layout
    function computeAndDraw() {
        const mod_wp = parseFloat(document.getElementById('mod_wp').value) || 0;
        const x = parseInt(document.getElementById('x_mods').value) || 0;
        const z = parseInt(document.getElementById('z_strings').value) || 0;
        const y = parseInt(document.getElementById('y_invs').value) || 0;
        const s = parseInt(document.getElementById('s_subs').value) || 0;
        const rings = parseInt(document.getElementById('b_cols').value) || 0;

        const total_invs = rings * s * y;
        const total_mw = (total_invs * z * x * mod_wp) / 1000000;

        document.getElementById('out_invs').textContent = total_invs;
        document.getElementById('out_subs').textContent = rings * s;
        document.getElementById('out_mw').textContent = total_mw.toFixed(2) + " MWp";

        // Generate GeoJSON based on math
        let features = [];
        const center = [0.9350, 51.3340]; // Primary Substation

        // 1. Add Primary Sub
        features.push(turf.point(center, { type: 'primary_sub', name: '400kV Grid Connection' }));

        // 2. Generate schematic layout based on multipliers
        const radiusStep = 0.3; // km spacing
        
        for (let r = 0; r < rings; r++) {
            let ringCoords = [center]; // Start ring at primary sub
            
            for (let sub = 0; sub < s; sub++) {
                // Space them out radially just to visualize the mathematical count
                const angle = (r * (360 / rings)) + (sub * 10);
                const distance = radiusStep * (sub + 1);
                
                // Use Turf to calculate coordinate
                const destination = turf.destination(turf.point(center), distance, angle, {units: 'kilometers'});
                const coords = destination.geometry.coordinates;
                
                // Add Inverter Node
                features.push(turf.point(coords, { 
                    type: 'inverter', 
                    ring_id: `Ring-${r+1}`, 
                    capacity_mw: ((z * x * mod_wp)/1000000).toFixed(2)
                }));
                
                ringCoords.push(coords);
            }
            // Close the ring back to substation
            ringCoords.push(center);
            
            // Add 33kV Trench Line
            features.push(turf.lineString(ringCoords, { type: '33kv_ring', ring_id: `Ring-${r+1}` }));
        }

        currentGeoJSON = turf.featureCollection(features);
        
        // Update Map
        if (map.getSource('topology')) {
            map.getSource('topology').setData(currentGeoJSON);
        }
    }

    function exportGeoJSON() {
        const blob = new Blob([JSON.stringify(currentGeoJSON, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "topology_substrate.geojson";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // Recalculate and redraw when inputs change
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', computeAndDraw);
    });
</script>

</body>
</html>
