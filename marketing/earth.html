<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>NOCTURNAL EARTH MODEL | VENTUS</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #container { width: 100vw; height: 100vh; transition: opacity 1s ease-in; }
        .hud {
            position: absolute; bottom: 40px; left: 40px; color: #00ffff; pointer-events: none;
            text-shadow: 0 0 15px #00ffff; border-left: 3px solid #00ffff; padding-left: 20px; z-index: 10;
        }
        .label { font-size: 28px; font-weight: bold; letter-spacing: 5px; text-transform: uppercase; }
        .tagline { font-size: 10px; letter-spacing: 1px; margin-top: 5px; color: #fff; opacity: 0.8; }
        .meta { font-size: 9px; opacity: 0.5; margin-top: 10px; line-height: 1.4; }
        #loader { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffff; font-size: 12px; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="loader">INITIALIZING VISUALIZATION...</div>

<div class="hud">
    <div class="label">Nocturnal Earth Model</div>
    <div class="tagline">VENTUS PLANETARY INFRASTRUCTURE ARCHITECTURE // 2050</div>
    <div class="meta">
        RENDERING: WEBGL SPHERICAL MESH<br>
        DYNAMICS: NOCTURNAL CYCLE, 23.5° TILT<br>
        ATMOSPHERE: PROCEDURAL LIGHTNING FX
    </div>
</div>

<div id="container" style="opacity: 0;"></div>

<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

<script type="module">
    import * as THREE from 'three';

    const container = document.getElementById('container');
    const loaderEl = document.getElementById('loader');
    
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
    container.appendChild(renderer.domElement);

    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    // Earth's 23.5-degree axial tilt
    earthGroup.rotation.z = 23.5 * (Math.PI / 180);

    // Texture Loading Manager
    const loadingManager = new THREE.LoadingManager(() => {
        loaderEl.style.display = 'none';
        container.style.opacity = '1';
    });

    const texLoader = new THREE.TextureLoader(loadingManager);
    
    const earthGeometry = new THREE.SphereGeometry(5, 64, 64);
    const earthMaterial = new THREE.MeshPhongMaterial({
        map: texLoader.load('https://unpkg.com/three-globe/example/img/earth-night.jpg'),
        bumpMap: texLoader.load('https://unpkg.com/three-globe/example/img/earth-topology.png'),
        bumpScale: 0.15, // Increased scale to make mountains pop more
        shininess: 5
    });
    
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    earthGroup.add(earth);

    // Lighting setup specifically tuned for night-time topography
    // Dim ambient light so the night texture isn't washed out
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    
    // A grazing "moonlight" direction to cast shadows on the bump map
    const moonlight = new THREE.DirectionalLight(0xccddff, 0.6);
    moonlight.position.set(-10, 5, 5);
    scene.add(moonlight);

    // Initial Camera Position (Zoomed back in from the previous step)
    camera.position.z = window.innerHeight > window.innerWidth ? 22 : 14;

    // --- LIGHTNING SIMULATION ---
    const flashes = [];
    const flashGeom = new THREE.SphereGeometry(0.03, 8, 8);
    
    function createLightning() {
        // Controls how frequently lightning spawns
        if (Math.random() > 0.15) return; 

        // Generate a random position on the sphere
        const u = Math.random();
        const v = Math.random();
        const theta = u * 2.0 * Math.PI;
        const phi = Math.acos(2.0 * v - 1.0);
        const radius = 5.01; // Positioned just above the surface

        const x = radius * Math.sin(phi) * Math.cos(theta);
        const y = radius * Math.sin(phi) * Math.sin(theta);
        const z = radius * Math.cos(phi);

        // Individual material so we can fade out opacity independently
        const flashMat = new THREE.MeshBasicMaterial({ 
            color: 0xeef2ff, // Cold white/blue storm color
            transparent: true, 
            opacity: 1 
        });
        
        const flash = new THREE.Mesh(flashGeom, flashMat);
        flash.position.set(x, y, z);
        earth.add(flash); // Attach to earth so the storms spin with the planet
        
        // Random decay rate makes some flashes quick and others linger slightly
        flashes.push({ mesh: flash, life: 1.0, decay: 0.05 + Math.random() * 0.15 });
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // Slowed down the spin (previously 0.008)
        earth.rotation.y += 0.0025; 
        
        // Handle lightning lifecycle
        createLightning();
        for (let i = flashes.length - 1; i >= 0; i--) {
            let f = flashes[i];
            f.life -= f.decay;
            f.mesh.material.opacity = f.life;
            
            // Remove when faded out to save memory
            if (f.life <= 0) {
                earth.remove(f.mesh);
                f.mesh.material.dispose();
                flashes.splice(i, 1);
            }
        }

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        // Keep zoomed-in level consistent on resize
        camera.position.z = window.innerHeight > window.innerWidth ? 22 : 14; 
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
