name: update-metal-prices

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # --- LV UPDATE ---
      - name: Run LV price update
        run: python scripts/update_prices_lv.py

      # --- 33kV UPDATE (SAFE even if already working) ---
      - name: Run 33kV price update
        run: python scripts/update_prices_33kv.py

      # --- COMMIT BOTH ---
      - name: Commit and Push changes
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"

          # Stage BOTH estimators
          git add lv_ac_dc_price_estimator/index.md
          git add 33kv_uk_dap_price_estimator/index.md

          # Only commit if something actually changed
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Automated metal price update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          else
            echo "No changes to commit"
          fi
