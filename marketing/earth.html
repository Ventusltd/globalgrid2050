<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>EARTH DIGITAL TWIN | VENTUS</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #container { width: 100vw; height: 100vh; transition: opacity 1s ease-in; }
        .hud {
            position: absolute; bottom: 40px; left: 40px; color: #00ffff; pointer-events: none;
            text-shadow: 0 0 15px #00ffff; border-left: 3px solid #00ffff; padding-left: 20px; z-index: 10;
        }
        .label { font-size: 28px; font-weight: bold; letter-spacing: 5px; text-transform: uppercase; }
        .tagline { font-size: 10px; letter-spacing: 1px; margin-top: 5px; color: #fff; opacity: 0.8; }
        .meta { font-size: 9px; opacity: 0.5; margin-top: 10px; line-height: 1.4; }
        #loader { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffff; font-size: 12px; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="loader">SYNCHRONIZING DIGITAL TWIN...</div>

<div class="hud">
    <div class="label">Earth Digital Twin</div>
    <div class="tagline">VENTUS PLANETARY INFRASTRUCTURE ARCHITECTURE // 2050</div>
    <div class="meta">
        COORDINATE SYSTEM: WGS 84 / EPSG:4326<br>
        VISUALIZATION: GPU-ACCELERATED SPHERICAL MESH<br>
        DYNAMICS: 23.5° TILT & DAY/NIGHT CYCLE
    </div>
</div>

<div id="container" style="opacity: 0;"></div>

<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

<script type="module">
    import * as THREE from 'three';

    const container = document.getElementById('container');
    const loaderEl = document.getElementById('loader');
    
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
    container.appendChild(renderer.domElement);

    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    // Apply Earth's 23.5-degree axial tilt to the container group
    earthGroup.rotation.z = 23.5 * (Math.PI / 180);

    // Texture Loading Manager
    const loadingManager = new THREE.LoadingManager(() => {
        loaderEl.style.display = 'none';
        container.style.opacity = '1';
    });

    const texLoader = new THREE.TextureLoader(loadingManager);
    
    const earthGeometry = new THREE.SphereGeometry(5, 64, 64);
    const earthMaterial = new THREE.MeshPhongMaterial({
        // Swapped to a standard daytime texture so the light creates the "night"
        map: texLoader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
        bumpMap: texLoader.load('https://unpkg.com/three-globe/example/img/earth-topology.png'),
        bumpScale: 0.05, 
        shininess: 8
    });
    
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    earthGroup.add(earth);

    // Global Lighting (Day/Night setup)
    // Very dim ambient light so the dark side of the earth looks like deep night
    scene.add(new THREE.AmbientLight(0xffffff, 0.05));
    
    // The "Sun" shining from a fixed direction
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(10, 0, 10);
    scene.add(sun);

    // Initial Camera Position for Portrait Mobile (Zoomed out)
    camera.position.z = window.innerHeight > window.innerWidth ? 35 : 25;

    function animate() {
        requestAnimationFrame(animate);
        
        // Spin the Earth mesh inside the tilted group. 
        // This spins the planet through the fixed sunlight, creating day and night.
        earth.rotation.y += 0.008; 
        
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.position.z = window.innerHeight > window.innerWidth ? 35 : 25; 
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
