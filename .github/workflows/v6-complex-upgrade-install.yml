name: V6 Complex Upgrade Install

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  v6-complex-upgrade-install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GRIDBOT_PAT }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Install active V6 upgrade and write report
        run: |
          python scripts/v6_complex_upgrade_installer.py \
            --active-file "solar-bess-topology-v6/upgrades/ACTIVE_UPGRADE.yml"

      - name: Commit and push approved upgrade changes
        env:
          PAT: ${{ secrets.GRIDBOT_PAT }}
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"

          git pull --rebase --autostash origin main
          git add solar-bess-topology-v6 gridbot_reports

          if git diff --cached --quiet; then
            echo "No approved V6 upgrade changes to commit."
            exit 0
          fi

          ACTIVE_UPGRADE=$(python - <<'PY'
          import yaml
          from pathlib import Path
          p = Path('solar-bess-topology-v6/upgrades/ACTIVE_UPGRADE.yml')
          data = yaml.safe_load(p.read_text()) or {}
          print(data.get('upgrade_id', 'unknown'))
          PY
          )

          git commit -m "V6 complex upgrade install: ${ACTIVE_UPGRADE}"
          git pull --rebase --autostash origin main
          git push https://${PAT}@github.com/${{ github.repository }}.git HEAD:main
