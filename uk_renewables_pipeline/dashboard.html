<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlobalGrid2050 | UK Renewables Pipeline</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* GlobalGrid2050 Dashboard Theme Variables */
            --bg: #000000;
            --panel: rgba(10, 10, 10, 0.96);
            --panel-soft: #0b0e14;
            --line: #2f343d;
            --line-soft: #222222;
            --text: #ffffff;
            --muted: #a6adbb;
            --muted-soft: #8d95a3;
            
            /* Accents */
            --accent: #00ffff;
            --accent-2: #ff00ff;
            --ok: #00ff88;
            --warn: #ffcc00;
            --error: #ff6666;

            /* Tech Colors */
            --tech-solar: #ffff00;
            --tech-battery: #ffae00;
            --tech-onshore: #00ffff;
            --tech-offshore: #0066ff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
        }

        /* Custom scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        * { scrollbar-width: thin; scrollbar-color: #333 var(--bg); }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 13px;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 250px;
            background-color: var(--panel);
            border-right: 1px solid var(--line-soft);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            z-index: 100;
        }

        .ventus-brand {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--line-soft);
            margin-bottom: 20px;
        }
        
        .ventus-main {
            font-family: -apple-system, sans-serif;
            font-size: 17px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        
        .ventus-sub {
            font-family: -apple-system, sans-serif;
            font-size: 6.5px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .user-profile {
            display: flex;
            align-items: center;
            padding: 0 20px 20px 20px;
            gap: 15px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #111;
            border: 1px solid var(--warn);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--warn);
        }

        .user-info p { font-size: 12px; font-weight: bold; color: var(--accent); }
        .user-info span { font-size: 10px; color: var(--muted-soft); text-transform: uppercase; }

        .nav-menu {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .nav-item {
            padding: 12px 20px;
            color: var(--muted);
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            text-transform: uppercase;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--accent);
            background: rgba(0, 255, 255, 0.08);
            border-left: 3px solid var(--accent);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 30px;
            overflow-y: auto;
            background: var(--bg);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--line-soft);
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 18px;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .status-box {
            border: 1px solid rgba(0,255,136,0.35);
            background: #090c11;
            color: #aef7d1;
            padding: 6px 12px;
            font-size: 11px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            background: var(--ok);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--ok);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Gauges */
        .gauges-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .gauge-card {
            background: var(--panel-soft);
            border: 1px solid var(--line-soft);
            border-radius: 4px;
            padding: 15px;
            text-align: center;
            position: relative;
        }

        .gauge-card h3 {
            font-size: 11px;
            color: var(--muted-soft);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .chart-wrapper {
            position: relative;
            height: 120px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .gauge-value {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            color: var(--text);
        }

        /* Filters */
        .filters-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--bg);
            color: var(--muted);
            border: 1px solid var(--line);
            padding: 8px 14px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .btn:hover { border-color: var(--accent); color: var(--accent); }
        
        /* Tech Button Colors */
        .btn.tech-btn.active[data-tech="All"] { background: rgba(255,255,255,0.1); color: #fff; border-color: #fff; }
        .btn.tech-btn.active[data-tech="Solar"] { background: rgba(255,255,0,0.1); color: var(--tech-solar); border-color: var(--tech-solar); }
        .btn.tech-btn.active[data-tech="Battery Storage"] { background: rgba(255,174,0,0.1); color: var(--tech-battery); border-color: var(--tech-battery); }
        .btn.tech-btn.active[data-tech="Onshore Wind"] { background: rgba(0,255,255,0.1); color: var(--tech-onshore); border-color: var(--tech-onshore); }
        .btn.tech-btn.active[data-tech="Offshore Wind"] { background: rgba(0,102,255,0.2); color: var(--tech-offshore); border-color: var(--tech-offshore); }

        /* Status Button Colors */
        .btn.status-btn.active { background: rgba(0, 255, 136, 0.1); color: var(--ok); border-color: var(--ok); }
        .btn.status-btn.active[data-status="All"] { background: rgba(255,255,255,0.1); color: #fff; border-color: #fff; }

        /* Table */
        .table-wrapper {
            background: var(--panel-soft);
            border: 1px solid var(--line-soft);
            border-radius: 4px;
            flex-grow: 1;
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #050505;
            color: var(--accent);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 15px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--line);
        }

        td {
            padding: 10px 15px;
            border-bottom: 1px solid var(--line-soft);
            font-size: 12px;
            color: var(--muted);
        }

        tr:hover { background: rgba(0, 255, 255, 0.03); }

        .site-name { color: var(--text); font-weight: bold; }

        .tech-badge {
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            color: #000;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .val-mw {
            color: var(--ok);
            font-weight: bold;
            font-size: 14px;
        }

        .news-link {
            text-decoration: none;
            font-size: 16px;
            transition: transform 0.2s;
            display: inline-block;
        }
        
        .news-link:hover {
            transform: scale(1.2);
        }

        .mobile-extra {
            display: none;
            font-size: 9px;
            color: #888;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: normal;
        }

        @media (max-width: 1024px) {
            .gauges-container { grid-template-columns: 1fr; }
            .sidebar { width: 200px; }
        }

        /* Mobile specific fixes */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--line-soft); padding: 10px; flex-direction: row; align-items: center; justify-content: space-between; }
            .user-profile, .nav-menu { display: none; }
            .ventus-brand { border: none; margin: 0; padding: 0; }
            .main-content { overflow: visible; padding: 10px; }
            
            /* Hide the dedicated columns on mobile */
            .hide-mobile { display: none; }
            
            /* Show the stacked data under Site Name */
            .mobile-extra { display: block; }

            th, td { padding: 8px 6px; font-size: 10px; }
            .tech-badge { font-size: 8px; padding: 2px 4px; }
            .val-mw { font-size: 12px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="ventus-brand">
            <div class="ventus-main">GlobalGrid2050</div>
            <div class="ventus-sub">Renewables Pipeline</div>
        </div>
        <div class="user-profile">
            <div class="avatar">GG</div>
            <div class="user-info">
                <p>System Admin</p>
                <span>SYSTEM ACCESS</span>
            </div>
        </div>
        <nav class="nav-menu">
            <a href="#" class="nav-item active">UK REPD DASH</a>
            <a href="../index.html" class="nav-item">DIRECTORY</a>
            <a href="https://globalgrid2050.com/repd_grid_atlasv8/" class="nav-item">MAP ATLAS</a>
            <a href="#" class="nav-item">EXPORT CSV</a>
        </nav>
    </aside>

    <main class="main-content">
        
        <div class="header">
            <h1>Analytics Dashboard</h1>
            <div class="status-box">
                <div class="live-dot"></div>
                Live REPD Source
            </div>
        </div>

        <div class="gauges-container">
            <div class="gauge-card">
                <h3>Filtered Capacity (MW)</h3>
                <div class="chart-wrapper">
                    <canvas id="gaugeTotal"></canvas>
                    <div class="gauge-value" id="valTotal">0</div>
                </div>
            </div>
            <div class="gauge-card">
                <h3>Filtered Projects</h3>
                <div class="chart-wrapper">
                    <canvas id="gaugeCount"></canvas>
                    <div class="gauge-value" id="valCount">0</div>
                </div>
            </div>
            <div class="gauge-card">
                <h3>Largest Single Site (MW)</h3>
                <div class="chart-wrapper">
                    <canvas id="gaugeMax"></canvas>
                    <div class="gauge-value" id="valMax">0</div>
                </div>
            </div>
        </div>

        <div class="filters-container" id="tech-filters">
            <button class="btn tech-btn active" data-tech="All">ALL TECH</button>
            <button class="btn tech-btn" data-tech="Solar">SOLAR</button>
            <button class="btn tech-btn" data-tech="Battery Storage">BATTERY</button>
            <button class="btn tech-btn" data-tech="Onshore Wind">ONSHORE</button>
            <button class="btn tech-btn" data-tech="Offshore Wind">OFFSHORE</button>
        </div>

        <div class="filters-container" id="status-filters" style="margin-bottom: 25px;">
            <button class="btn status-btn active" data-status="All">ALL STATUS</button>
            <button class="btn status-btn" data-status="Operational">OPERATIONAL</button>
            <button class="btn status-btn" data-status="Under Construction">CONSTRUCTING</button>
            <button class="btn status-btn" data-status="Awaiting Construction">AWAITING</button>
            <button class="btn status-btn" data-status="Application Submitted">SUBMITTED</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Site Name</th>
                        <th class="hide-mobile">County</th>
                        <th class="hide-mobile">Operator</th>
                        <th>Technology</th>
                        <th>Status</th>
                        <th>Capacity (MW)</th>
                        <th>News</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>

    </main>

    <script>
        let allData = [];
        let currentTech = 'All';
        let currentStatus = 'All';
        let chartTotal, chartCount, chartMax;

        const techColors = {
            'Solar': 'var(--tech-solar)',
            'Battery Storage': 'var(--tech-battery)',
            'Onshore Wind': 'var(--tech-onshore)',
            'Offshore Wind': 'var(--tech-offshore)'
        };

        function initGauges() {
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                circumference: 180,
                rotation: 270,
                cutout: '80%',
                plugins: { tooltip: { enabled: false }, legend: { display: false } }
            };

            const ctxTotal = document.getElementById('gaugeTotal').getContext('2d');
            chartTotal = new Chart(ctxTotal, { type: 'doughnut', data: { datasets: [{ data: [0, 1], backgroundColor: ['#ff00ff', '#222'], borderWidth: 0 }] }, options: commonOptions });

            const ctxCount = document.getElementById('gaugeCount').getContext('2d');
            chartCount = new Chart(ctxCount, { type: 'doughnut', data: { datasets: [{ data: [0, 1], backgroundColor: ['#00ffff', '#222'], borderWidth: 0 }] }, options: commonOptions });

            const ctxMax = document.getElementById('gaugeMax').getContext('2d');
            chartMax = new Chart(ctxMax, { type: 'doughnut', data: { datasets: [{ data: [0, 1], backgroundColor: ['#00ff88', '#222'], borderWidth: 0 }] }, options: commonOptions });
        }

        function updateGauges(filteredData) {
            const totalMW = filteredData.reduce((sum, item) => sum + item.Capacity_MW, 0);
            const count = filteredData.length;
            const maxMW = count > 0 ? Math.max(...filteredData.map(d => d.Capacity_MW)) : 0;

            document.getElementById('valTotal').innerText = totalMW.toLocaleString(undefined, {maximumFractionDigits: 0});
            document.getElementById('valCount').innerText = count.toLocaleString();
            document.getElementById('valMax').innerText = maxMW.toLocaleString(undefined, {maximumFractionDigits: 1});

            const globalTotal = allData.reduce((sum, item) => sum + item.Capacity_MW, 0) || 100000;
            const globalCount = allData.length || 1000;
            const globalMax = Math.max(...allData.map(d => d.Capacity_MW)) || 5000;

            chartTotal.data.datasets[0].data = [totalMW, Math.max(globalTotal - totalMW, 0)];
            chartTotal.update();

            chartCount.data.datasets[0].data = [count, Math.max(globalCount - count, 0)];
            chartCount.update();

            chartMax.data.datasets[0].data = [maxMW, Math.max(globalMax - maxMW, 0)];
            chartMax.update();
        }

        function updateTable(filteredData) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            filteredData.slice(0, 150).forEach(item => {
                const tr = document.createElement('tr');
                const bgColor = techColors[item['Tech Category']] || '#888';
                const fontColor = item['Tech Category'] === 'Offshore Wind' ? '#fff' : '#000';
                
                const searchQuery = encodeURIComponent(`${item['Site Name']} ${item['Tech Category']}`);
                const newsUrl = `https://www.google.com/search?q=${searchQuery}&tbm=nws`;
                
                // Build the mobile subtitle dynamically
                let subtextArray = [];
                if (item['County']) subtextArray.push(item['County']);
                if (item['Operator']) subtextArray.push(item['Operator']);
                let subtext = subtextArray.length > 0 ? subtextArray.join(' | ') : '';
                
                // Desktop row displays
                let countyDisplay = item['County'] || '-';
                let opDisplay = item['Operator'] || '-';

                tr.innerHTML = `
                    <td class="site-name">
                        ${item['Site Name']}
                        ${subtext ? `<div class="mobile-extra">${subtext}</div>` : ''}
                    </td>
                    <td class="hide-mobile" style="color: #888; font-size: 11px;">${countyDisplay}</td>
                    <td class="hide-mobile">${opDisplay}</td>
                    <td><span class="tech-badge" style="background:${bgColor}; color:${fontColor}">${item['Tech Category']}</span></td>
                    <td style="font-size:10px">${item['Status']}</td>
                    <td class="val-mw">${item.Capacity_MW.toFixed(1)}</td>
                    <td style="text-align:center;">
                        <a href="${newsUrl}" target="_blank" class="news-link" title="Search Google News for ${item['Site Name']}">📰</a>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function applyFilters() {
            let filtered = allData;
            
            if (currentTech !== 'All') {
                filtered = filtered.filter(d => d['Tech Category'] === currentTech);
            }

            if (currentStatus !== 'All') {
                filtered = filtered.filter(d => d['Status'].includes(currentStatus));
            }

            updateGauges(filtered);
            updateTable(filtered);
        }

        document.querySelectorAll('.tech-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tech-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentTech = e.target.getAttribute('data-tech');
                applyFilters();
            });
        });

        document.querySelectorAll('.status-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentStatus = e.target.getAttribute('data-status');
                applyFilters();
            });
        });

        function titleCase(str) {
            if (!str) return '';
            return str.toLowerCase().split(' ').map(function(word) {
                return (word.charAt(0).toUpperCase() + word.slice(1));
            }).join(' ');
        }

        window.onload = () => {
            initGauges();
            
            // CACHE BUSTER ADDED HERE
            fetch('../dist/repd_master.json?v=' + new Date().getTime())
                .then(response => response.json())
                .then(geojson => {
                    let parsedData = [];

                    (geojson.features || []).forEach(f => {
                        const props = f.properties || {};
                        const tech = props.tech || '';
                        const raw_tech = String(props.raw_tech || '').toLowerCase();
                        
                        let cat = 'Other';
                        if (tech === 'solar' || tech === 'solar_roof') {
                            cat = 'Solar';
                        } else if (tech === 'bess') {
                            cat = 'Battery Storage';
                        } else if (tech === 'wind') {
                            cat = raw_tech.includes('offshore') ? 'Offshore Wind' : 'Onshore Wind';
                        }

                        // Grab the location data, stripping out Pandas "nan" or "None"
                        let rawCounty = props.county || props.County || props.lpa || props.local_planning_authority || props.region || '';
                        let cleanCounty = String(rawCounty).trim();
                        if (cleanCounty.toLowerCase() === 'nan' || cleanCounty.toLowerCase() === 'none') {
                            cleanCounty = '';
                        }

                        // Grab the Operator, stripping out Pandas "nan"
                        let rawOperator = props.operator || props.Operator || '';
                        let cleanOperator = String(rawOperator).trim().toUpperCase();
                        if (cleanOperator === 'NAN' || cleanOperator === 'NONE') {
                            cleanOperator = '';
                        }

                        if (cat !== 'Other') {
                            parsedData.push({
                                'Site Name': props.name || 'Unknown Site',
                                'County': cleanCounty,
                                'Operator': cleanOperator,
                                'Tech Category': cat,
                                'Status': titleCase(props.status || 'Unknown'),
                                'Capacity_MW': parseFloat(props.capacity) || 0
                            });
                        }
                    });

                    parsedData.sort((a, b) => b.Capacity_MW - a.Capacity_MW);
                    allData = parsedData;
                    applyFilters();
                })
                .catch(err => {
                    console.error("Error loading REPD data:", err);
                    document.getElementById('table-body').innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--error);">Error loading ../dist/repd_master.json. Are you running a local server?</td></tr>`;
                });
        };
    </script>
</body>
</html>
