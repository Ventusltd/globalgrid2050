name: Update Heaviest Carbon Emitters

on:
  schedule:
    - cron: '0 0 1 * *' 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  update-emissions-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Emissions Fetcher
        run: python scripts/fetch_heavy_emitters.py

      - name: Commit and Push via Gridbot
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "gridbot@users.noreply.github.com"
          
          # Force add the file to bypass any .gitignore rules
          git add -f heaviest_emitters.geojson
          
          git status
          
          git commit -m "🤖 Gridbot: Updated heaviest carbon emitters GeoJSON" || echo "No changes to commit"
          git push || echo "No changes to push"
