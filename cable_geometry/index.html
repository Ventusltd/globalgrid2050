<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cable Geometry Visualiser v1.5.18</title>
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(10, 10, 10, 0.96);
            --panel-soft: #0b0e14;
            --line: #2f343d;
            --line-soft: #222;
            --text: #ffffff;
            --muted: #a6adbb;
            --muted-soft: #8d95a3;
            --accent: #00ffff;
            --accent-2: #ff00ff;
            --ok: #00ff88;
            --warn: #ffcc66;
            --warn-bg: rgba(80, 50, 0, 0.18);
            --warn-line: #5a3d00;
            --error: #ff6666;
            --error-bg: rgba(80, 10, 10, 0.18);
            --error-line: #5a1f1f;
            --info: #8fb2d9;
            --info-bg: rgba(14, 32, 48, 0.28);
            --info-line: #28455d;
            --input-bg: #111;
            --canvas-bg: #000;
            --shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            font-family: "Courier New", monospace;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1480px;
            align-items: flex-start;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .panel-left { width: 470px; flex-shrink: 0; }
        .panel-right { flex: 1 1 auto; display: flex; flex-direction: column; gap: 20px; }

        h2 {
            margin: 0 0 15px 0;
            color: var(--accent);
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--line);
            padding-bottom: 10px;
        }

        h3 {
            margin: 0 0 10px 0;
            color: var(--muted-soft);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-title { margin-top: 18px; }

        .input-group {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 12px;
            color: var(--muted);
            align-items: center;
        }

        .input-group label { flex: 1; }

        .input-group input,
        .input-group select {
            width: 190px;
            background: var(--input-bg);
            color: var(--accent);
            border: 1px solid #444;
            padding: 7px 8px;
            font-family: monospace;
            border-radius: 3px;
        }

        canvas {
            background: var(--canvas-bg);
            border: 1px solid #333;
            box-shadow: var(--shadow);
            display: block;
            max-width: 100%;
        }
    </style>
</head>

<body>
<div class="dashboard">

<div class="panel panel-left">
<h2>Geometry Inputs</h2>

<h3>Installation Basis</h3>

<div class="input-group">
    <label for="service_type">Service Type</label>
    <select id="service_type">
        <option value="lv" selected>LV AC</option>
        <option value="mv">33kV AC</option>
        <option value="ehv">132kV AC</option>
        <option value="dc">DC</option>
    </select>
</div>

<h3 class="section-title">Cable OD Lookup</h3>

<div class="input-group">
    <label for="lookup_cores">Cores</label>

    <!-- ✅ FIXED SECTION -->
    <select id="lookup_cores">
        <option value="any">All Core Types</option>
        <option value="single">Single Core</option>
        <option value="two">2 Core</option>
        <option value="three">3 Core</option>
        <option value="four">4 Core</option>
        <option value="five">5 Core</option>
    </select>
</div>

<div class="input-group">
    <label for="lookup_voltage">Voltage Class</label>
    <select id="lookup_voltage">
        <option value="">— manual OD entry —</option>
    </select>
</div>

<div class="input-group">
    <label for="lookup_csa">CSA mm²</label>
    <select id="lookup_csa">
        <option value="">— select voltage first —</option>
    </select>
</div>

</div>

<div class="panel panel-right">
    <canvas id="formation_canvas" width="900" height="420"></canvas>
</div>

</div>

<script src="data-core.js"></script>
<script src="data-lv.js"></script>
<script src="data-mv-hv.js"></script>
<script src="data-solar.js"></script>
<script src="app.js"></script>

</body>
</html>
