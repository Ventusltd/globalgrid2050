name: V5 Skid MVA Controls Upgrade

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run V5 skid MVA controls upgrade
        run: python scripts/upgrade_v5_skid_mva_controls.py

      - name: Commit V5 skid MVA controls upgrade
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Upgrade V5 skid MVA and central inverter controls
          file_pattern: solar-bess-topology-v5/indexforgis-sld-v5.html solar-bess-topology-v5/gis-sld-v5-calculations.js solar-bess-topology-v5/gis-sld-v5-ui-core.js gridbot_reports/v5_skid_mva_controls_upgrade.md
