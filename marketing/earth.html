<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>EARTH | VENTUS</title>
    
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #container { width: 100vw; height: 100vh; transition: opacity 1s ease-in; }
        
        /* Custom HUD over the Cesium canvas */
        .hud {
            position: absolute; bottom: 40px; left: 40px; color: #00ffff; pointer-events: none;
            text-shadow: 0 0 15px #00ffff; border-left: 3px solid #00ffff; padding-left: 20px; z-index: 10;
        }
        .label { font-size: 20px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; line-height: 1.4; }
        .tagline { font-size: 10px; letter-spacing: 1px; margin-top: 10px; color: #fff; opacity: 0.8; }
        .meta { font-size: 9px; opacity: 0.5; margin-top: 10px; line-height: 1.4; }
        
        /* Hide default Cesium credits for clean UI */
        .cesium-viewer-bottom { display: none !important; }
    </style>
</head>
<body>

<div class="hud">
    <div class="label" id="timeDisplay"></div>
    <div class="tagline">VENTUS PLANETARY INFRASTRUCTURE ARCHITECTURE // 2050</div>
    <div class="meta">
        ENGINE: CESIUMJS GEOSPATIAL PLATFORM<br>
        IMAGERY: SATELLITE TILE STREAMING (LOD 19)<br>
        DYNAMICS: INTERACTIVE WITH AUTO-SUSPEND ROTATION
    </div>
</div>

<div id="container"></div>

<script>
    // --- TIME & COUNTDOWN LOGIC ---
    const timeDisplay = document.getElementById('timeDisplay');
    const targetDate = new Date('2050-01-01T00:00:00Z').getTime();

    function updateTime() {
        const now = new Date();
        
        const year = now.getUTCFullYear();
        const month = String(now.getUTCMonth() + 1).padStart(2, '0');
        const date = String(now.getUTCDate()).padStart(2, '0');
        const currHours = String(now.getUTCHours()).padStart(2, '0');
        const currMins = String(now.getUTCMinutes()).padStart(2, '0');
        const currSecs = String(now.getUTCSeconds()).padStart(2, '0');
        const currentStr = `${year}-${month}-${date} ${currHours}:${currMins}:${currSecs} UTC`;

        const distance = targetDate - now.getTime();
        
        if (distance < 0) {
            timeDisplay.innerHTML = `${currentStr}<br>TARGET 2050 REACHED`;
            return;
        }

        const d = Math.floor(distance / (1000 * 60 * 60 * 24));
        const h = String(Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
        const m = String(Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
        const s = String(Math.floor((distance % (1000 * 60)) / 1000)).padStart(2, '0');

        timeDisplay.innerHTML = `${currentStr}<br>T-MINUS: ${d}D ${h}:${m}:${s}`;
    }
    
    setInterval(updateTime, 1000);
    updateTime();

    // --- CESIUMJS ENGINE INITIALIZATION ---
    Cesium.Ion.defaultAccessToken = ''; 

    const viewer = new Cesium.Viewer('container', {
        imageryProvider: new Cesium.UrlTemplateImageryProvider({
            url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            maximumLevel: 19 
        }),
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        infoBox: false,
        selectionIndicator: false,
        sceneModePicker: false,
        navigationHelpButton: false,
        animation: false,
        timeline: false,
        fullscreenButton: false,
        requestRenderMode: false // Must be false for continuous programmatic rotation
    });

    viewer.scene.globe.enableLighting = true;

    // Set initial camera view
    viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(-0.1276, 51.5072, 20000000) 
    });

    // --- AUTO-ROTATION & INTERACTION LOGIC ---
    let isRotating = true;

    // Rotate the camera around the Z-axis (Earth's poles) every frame
    viewer.scene.preUpdate.addEventListener(function(scene, time) {
        if (isRotating) {
            viewer.camera.rotate(Cesium.Cartesian3.UNIT_Z, 0.0005); 
        }
    });

    // Listen for user input to stop the rotation
    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

    function stopRotation() {
        isRotating = false;
        // Re-enable requestRenderMode to save CPU/GPU now that continuous animation has stopped
        viewer.scene.requestRenderMode = true; 
    }

    // Stop rotation on click, drag, or scroll/zoom
    handler.setInputAction(stopRotation, Cesium.ScreenSpaceEventType.LEFT_DOWN);
    handler.setInputAction(stopRotation, Cesium.ScreenSpaceEventType.MIDDLE_DOWN);
    handler.setInputAction(stopRotation, Cesium.ScreenSpaceEventType.RIGHT_DOWN);
    handler.setInputAction(stopRotation, Cesium.ScreenSpaceEventType.WHEEL);
    handler.setInputAction(stopRotation, Cesium.ScreenSpaceEventType.PINCH_START);
</script>
</body>
</html>
