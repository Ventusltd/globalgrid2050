name: update-metal-prices

on:
  schedule:
    - cron: '0 6 * * *' # Runs at 06:00 UTC daily
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write # Essential for the bot to push changes back to the repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run price update script
        run: python scripts/update_prices.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"
          git add 33kv_uk_dap_price_estimator/index.md
          # Check if there are changes before trying to commit
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Automated price update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          else
            echo "No changes to commit"
          fi
