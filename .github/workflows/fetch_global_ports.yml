name: Generate Global Ports Data

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  schedule:
    - cron: '0 2 1 * *' # Runs at 02:00 on the 1st of every month to capture new infrastructure

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Global Ports ETL Pipeline
        run: python fetch_global_ports.py
        # Adjust the path above if you put the python script in a specific 'scripts/' folder

      - name: Commit and Push GeoJSON Cartridge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Ventus-OS-Agent"
          git config --global user.email "actions@github.com"
          git add global_ports.geojson
          # Only commit if there are actual changes to prevent empty commits
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(data): automated update of global_ports.geojson" && git push)
