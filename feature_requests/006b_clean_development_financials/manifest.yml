    text: 'fin_central_dev_operating_npv'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'devOperatingNpv'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'fin_development_operating_npv_gbp'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'Operating Asset Net Present Value (NPV) £ per Megawatt peak (MWp)'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'Buyer or Revenue Agreement Reviewed (Power Purchase Agreement (PPA) / Offtaker)'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'Financial Model Logic'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'Operating Asset Net Present Value (NPV) input is user editable'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
