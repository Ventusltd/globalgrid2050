name: Fix V2 config load order
summary: Removes defer from gis-sld-v2-config.js so CONSTANTS is available before the inline application script runs.

operations:
  - type: replace
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    find: '<script src="gis-sld-v2-config.js" defer></script>'
    replace: '<script src="gis-sld-v2-config.js"></script>'
    count: 1

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: '<script src="gis-sld-v2-config.js"></script>'

  - type: assert_contains
    file: solar-bess-topology-v2/gis-sld-v2-config.js
    text: 'M2_PER_ACRE: 4046.86'

  - type: assert_contains
    file: solar-bess-topology-v2/indexforgis-sld-v2.html
    text: 'const state = {'
