name: Update Heaviest Carbon Emitters

on:
  schedule:
    - cron: '0 0 1 * *' # Runs at midnight on the 1st of every month
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write # Essential for Gridbot to push changes

jobs:
  update-emissions-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Emissions Fetcher
        run: python scripts/fetch_heavy_emitters.py

      - name: Commit and Push via Gridbot
        run: |
          git config --global user.name "gridbot"
          git config --global user.email "gridbot@users.noreply.github.com"
          
          # 1. Force add the file (bypasses .gitignore completely)
          git add -f heaviest_emitters.geojson
          
          # 2. Print the git status to the logs so we can see exactly what Git sees
          git status
          
          # 3. Commit the file. If there are no changes, echo a message instead of failing
          git commit -m "🤖 Gridbot: Updated heaviest carbon emitters GeoJSON" || echo "No changes to commit"
          
          # 4. Push to the main branch
          git push || echo "No changes to push"
