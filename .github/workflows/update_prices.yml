name: update-metal-prices

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GRIDBOT_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run LV price update
        run: python scripts/update_prices_lv.py

      - name: Run 33kV price update
        run: python scripts/update_prices.py

      - name: Commit and push changes
        run: |
          set -e

          git config --global user.name "gridbot"
          git config --global user.email "bot@globalgrid2050.com"

          git add lv_ac_dc_price_estimator/index.md
          git add 33kv_uk_dap_price_estimator/index.md

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Automated price update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD
          else
            echo "No changes to commit"
          fi
